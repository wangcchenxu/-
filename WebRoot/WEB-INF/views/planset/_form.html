<form id="updatePlanForm" class="form-horizontal">
    <br>
    <div class="form-group">
        <input type="hidden" id="inputPid" value="${(result.pid)!}" />
        <input type="hidden" id="inputPeriodTime" value="${(result.periodTime)!}" />
        <input type="hidden" id="inputColor" value="${(result.color)!}" class="form-control">
        <label class="col-sm-2 control-label">班次样式*</label>
        <div class="col-sm-6" id="styleSelector">
            <div class="style-option" data-color="#d9534f" data-name="充网告警_夜">
                <div class="style-preview" style="background-color:#d9534f;"></div>
                <span>充网告警_夜</span>
            </div>
            <div class="style-option" data-color="#f0ad4e" data-name="充网告警_白1">
                <div class="style-preview" style="background-color:#f0ad4e;"></div>
                <span>充网告警_白1</span>
            </div>
            <div class="style-option" data-color="#f0e68c" data-name="充网告警_白2">
                <div class="style-preview" style="background-color:#f0e68c;"></div>
                <span>充网告警_白2</span>
            </div>
            <div class="style-option" data-color="#cccccc" data-name="休息">
                <div class="style-preview" style="background-color:#cccccc;"></div>
                <span>休息</span>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="col-sm-2 control-label">班次名称*</label>
        <div class="col-sm-6">
            <input type="text" name="inputPlanName" id="inputPlanName" value="${(result.planName)!}" class="form-control required">
        </div>
    </div>
    <div class="form-group">
        <label class="col-sm-2 control-label">定义类型</label>
        <div class="col-sm-6">
            <select value="${(result.defineType)!}" disabled id="inputDefineType" class="form-control">
                <option value="1">系统定义</option>
                <option value="2">自定义</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="col-sm-2 control-label">班次类型</label>
        <div class="col-sm-6">
            <select value="${(result.planType)!}" id="inputPlanType" class=" form-control">
                <option value="1">工作</option>
                <option value="2">非工作</option>
                <option value="3">其他</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label class="col-sm-2 control-label">开始时间*</label>
        <div class="col-sm-6">
            <div id="planStartTime" class="input-group date form_time" data-date="" data-date-format="hh:ii" data-link-format="hh:ii">
                <input name="inputStartTime" id="inputStartTime" class="form-control" size="16" type="text">
                <span class="input-group-addon"><span class="glyphicon glyphicon-time"></span></span>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="col-sm-2 control-label">结束时间*</label>
        <div class="col-sm-6">
            <div id="planEndTime" class="input-group date form_time" data-date="" data-date-format="hh:ii" data-link-format="hh:ii">
                <input name="inputEndTime" id="inputEndTime" class="form-control" size="16" type="text">
                <span class="input-group-addon"><span class="glyphicon glyphicon-time"></span></span>
            </div>
        </div>
    </div>
    <div class="form-group">
        <label class="col-sm-2 control-label">总时间（小时）</label>
        <div class="col-sm-6">
            <input type="text" id="inputTotalTime" disabled value="${(result.totalTime)!}" class="form-control">
        </div>
    </div>
</form>
<style>
#styleSelector {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}
.style-option {
    padding: 8px 12px;
    border: 2px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 80px;
}
.style-option:hover {
    border-color: #999;
}
.style-option.active {
    border-color: #0275d8;
    box-shadow: 0 0 5px rgba(2, 117, 216, 0.5);
}
.style-preview {
    width: 50px;
    height: 30px;
    border-radius: 3px;
    border: 1px solid #999;
}
.style-option span {
    font-size: 12px;
    text-align: center;
    word-break: break-word;
}
</style>
<script>
$(document).ready(function() {
    const currentColor = $('#inputColor').val();
    $('#styleSelector .style-option').each(function() {
        if ($(this).data('color') === currentColor) {
            $(this).addClass('active');
        }
    });
    
    $('#styleSelector .style-option').click(function() {
        $('#styleSelector .style-option').removeClass('active');
        $(this).addClass('active');
        $('#inputColor').val($(this).data('color'));
    });

    window.planValidator=$('#updatePlanForm').bootstrapValidator({
        message: '无效的输入值',
        feedbackIcons: {
            valid: 'glyphicon glyphicon-ok',
            invalid: 'glyphicon glyphicon-remove',
            validating: 'glyphicon glyphicon-refresh'
        },
        fields: {
            inputPlanName: {
                message: '无效的班次名称',
                validators: {
                    notEmpty: {
                        message: '不能为空'
                    },
                    stringLength: {
                        min: 2,
                        max: 10,
                        message: '字符个数为2到10'
                    }
                }
            },
            inputStartTime: {
                validators: {
                    notEmpty: {
                        message: '开始时间不能为空'
                    }
                }
            },
            inputEndTime: {
                validators: {
                    notEmpty: {
                        message: '结束时间不能为空'
                    }
                }
            }
        }
    });
});
</script>
