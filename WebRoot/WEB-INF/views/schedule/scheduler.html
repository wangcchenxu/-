<div class="header">
    <div class="stats">
    </div>
    <h1 class="page-title">排班管理</h1>
    <ul class="breadcrumb">
        <li><a href="./">Home</a> </li>
        <li class="active">排班管理</li>
    </ul>
</div>

<div class="main-content">
    <div id="schedule_step1" class="schedule-step">
        <h3>员工假期需求</h3>
        <p>记录员工在指定月份内需要休息的具体日期，保存后将自动生成班表</p>
        <div style="margin: 20px 0;">
            <label>选择月份：</label>
            <input type="month" id="schedule_month" style="padding:5px 10px;font-size:14px;">
            <span id="schedule_recommend_info" style="margin-left:20px;color:#17a2b8;font-weight:bold;display:none;">
                <i class="fa fa-lightbulb-o"></i> 
                推荐：本月共 <span id="schedule_days_count"></span> 天，建议每人上班 <span id="schedule_recommend_days"></span> 天（<span id="schedule_recommend_note"></span>）
            </span>
        </div>
        <table id="schedule_demand_table" class="table table-bordered" style="margin-top:20px;">
            <thead>
                <tr>
                    <th style="width:15%;">员工姓名</th>
                    <th style="width:12%;">本月上班天数</th>
                    <th style="width:18%;">休息日期（可多选，用逗号分隔）</th>
                    <th style="width:15%;">偏好班次（选填）</th>
                    <th style="width:20%;">希望一起上班的同事（选填，用逗号分隔）</th>
                    <th style="width:20%;">操作</th>
                </tr>
            </thead>
            <tbody id="schedule_demand_body">
            </tbody>
        </table>
        <button type="button" id="schedule_step1_save" class="btn btn-success" style="margin-top:10px;">
            <i class="fa fa-save"></i> 保存并生成班表
        </button>
    </div>
    
    <div id="schedule_roster_section" style="display:none; margin-top:30px;">
        <h3>生成的班表</h3>
        <div id="schedule_roster_container" style="overflow-x:auto; overflow-y:auto; margin-top:20px; max-height:600px; border:1px solid #ddd;">
            <table id="schedule_roster_table" class="table table-bordered table-condensed" style="border-collapse:collapse;width:auto;font-size:12px;table-layout:fixed;">
                <thead id="schedule_roster_head"></thead>
                <tbody id="schedule_roster_body"></tbody>
            </table>
        </div>
        <button type="button" id="schedule_export_btn" class="btn btn-info" style="margin-top:20px;" disabled>
            <i class="fa fa-download"></i> 导出班表
        </button>
        <button type="button" id="schedule_save_to_history_btn" class="btn btn-success" style="margin-top:20px;margin-left:10px;display:none;">
            <i class="fa fa-save"></i> 保存到历史排班
        </button>
        <span id="export_loading" style="display:none; margin-left:10px; color:#999;">
            <i class="fa fa-spinner fa-spin"></i> 正在导出...
        </span>
    </div>
</div>

<script type="text/javascript">
$(function() {
    // ===== 版本标记：用于确认代码是否更新 =====
    console.log('%c========== 排班算法 v4.0 (分层递进式) ==========', 'color: green; font-size: 16px; font-weight: bold;');
    console.log('%c核心特性: 1. 月度配额计算 2. 连续块模式生成 3. 逐日精排 4. 全局优化 5. 跨月记忆', 'color: blue;');
    console.log('%c如果看不到此日志,说明浏览器缓存了旧代码,请按 Ctrl+F5 强制刷新', 'color: orange;');
    console.log('=================================================', 'color: green; font-size: 16px; font-weight: bold;');
    
    console.log('排班管理页面加载...');
    var currentMonth = new Date().toISOString().substring(0, 7);
    $('#schedule_month').val(currentMonth);
    
    var scheduleGenerated = false;
    var generatedMonth = null;
    var personList = [];
    var currentRoster = null;
    
    // 同步标志，避免重复请求
    var historySyncFlags = {};

    function getSchedulePageState() {
        return JSON.parse(localStorage.getItem('schedule_page_state') || '{}');
    }

    function saveSchedulePageState() {
        var state = {
            selectedMonth: $('#schedule_month').val(),
            generatedMonth: generatedMonth,
            scheduleGenerated: scheduleGenerated
        };
        localStorage.setItem('schedule_page_state', JSON.stringify(state));
    }

    function getSavedRosterForMonth(month) {
        // 优先从 schedule_roster 读取
        var all = JSON.parse(localStorage.getItem('schedule_roster') || '{}');
        if (all[month]) {
            return all[month];
        }
        
        // 如果没有，尝试从 schedule_history 恢复（兼容旧数据）
        var history = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        var historyData = history[month];
        if (historyData && historyData.assignments) {
            // 将历史数据转换为 roster 格式
            var persons = [];
            Object.keys(historyData.assignments).forEach(function(pid) {
                persons.push({
                    pid: pid,
                    name: pid,
                    assignments: historyData.assignments[pid]
                });
            });
            
            var year = parseInt(month.split('-')[0], 10);
            var monthNum = parseInt(month.split('-')[1], 10);
            var daysInMonth = new Date(year, monthNum, 0).getDate();
            
            return {
                month: month,
                daysInMonth: daysInMonth,
                persons: persons
            };
        }
        
        return null;
    }

    function saveRosterForMonth(month, roster) {
        var all = JSON.parse(localStorage.getItem('schedule_roster') || '{}');
        all[month] = roster;
        localStorage.setItem('schedule_roster', JSON.stringify(all));
        
        // 同时保存到历史排班，确保历史数据不丢失
        var history = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        var historyData = {
            month: month,
            assignments: {}
        };
        
        if (roster && roster.persons) {
            roster.persons.forEach(function(emp) {
                historyData.assignments[emp.pid] = emp.assignments || {};
            });
        }
        
        history[month] = historyData;
        localStorage.setItem('schedule_history', JSON.stringify(history));
    }

    function collectCurrentDemands() {
        var month = $('#schedule_month').val();
        var demands = [];
        $('#schedule_demand_body tr').each(function() {
            var pid = $(this).find('.schedule-work-days').data('pid');
            var restDays = $(this).find('.schedule-rest-days').val();
            var workDays = parseInt($(this).find('.schedule-work-days').val(), 10);
            var preferShift = $(this).find('.schedule-prefer-shift').val();
            var preferColleagues = $(this).find('.schedule-prefer-colleagues').val();
            if (isNaN(workDays) || workDays < 0) workDays = 15;
            demands.push({
                pid: pid,
                month: month,
                restDays: restDays,
                workDays: workDays,
                preferShift: preferShift,
                preferColleagues: preferColleagues
            });
        });
        return demands;
    }

    function restorePageState() {
        var state = getSchedulePageState();
        if (state.selectedMonth) {
            $('#schedule_month').val(state.selectedMonth);
            currentMonth = state.selectedMonth;
        }
    }

    function restoreRosterForMonth(month) {
        var savedRoster = getSavedRosterForMonth(month);
        if (savedRoster) {
            currentRoster = savedRoster;
            renderRoster(savedRoster);
            scheduleGenerated = true;
            generatedMonth = month;
            $('#schedule_roster_section').show();
        }
    }

    function getSavedDemandsForMonth(month) {
        var all = JSON.parse(localStorage.getItem('schedule_demands') || '{}');
        return all[month] || [];
    }

    function saveDemandsForMonth(month, demands) {
        var all = JSON.parse(localStorage.getItem('schedule_demands') || '{}');
        all[month] = demands;
        localStorage.setItem('schedule_demands', JSON.stringify(all));
    }

    function getHistoryForMonth(month) {
        var all = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        
        // 如果localStorage中有数据，直接返回
        if (all[month]) {
            return all[month];
        }
        
        // 如果还没有同步过，尝试从后端异步加载
        if (!historySyncFlags[month]) {
            historySyncFlags[month] = true; // 标记为已请求
            
            $.ajax({
                url: '/FinalScheduler/api/loadHistory?month=' + month,
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response && response.history) {
                        console.log('从后端异步加载历史数据到排班页面:', month);
                        // 同步到localStorage
                        var currentAll = JSON.parse(localStorage.getItem('schedule_history') || '{}');
                        currentAll[month] = response.history;
                        localStorage.setItem('schedule_history', JSON.stringify(currentAll));
                    }
                },
                error: function(xhr, status, error) {
                    console.log('后端没有' + month + '的历史数据或加载失败:', error);
                }
            });
        }
        
        // 直接返回localStorage中的数据（如果没有则为null）
        // 后端异步加载完成后会自动更新localStorage，下次调用时即可获取
        return all[month] || null;
    }

    function getPreviousMonth(month) {
        var parts = month.split('-');
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        m--;
        if (m < 1) { y--; m = 12; }
        return y + '-' + (m < 10 ? '0' + m : m);
    }

    function loadPersonList() {
        var month = $('#schedule_month').val();
        var savedDemands = getSavedDemandsForMonth(month);
        var [year, monthStr] = month.split('-');
        var daysInMonth = new Date(year, monthStr, 0).getDate();
        
        console.log('加载人员列表...');
        $.ajax({
            url: '/FinalScheduler/queryPerson',
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                console.log('人员数据:', data);
                var html = '';
                var rows = data.slice();
                if (rows.length === 0) {
                    for (var i = 1; i <= 8; i++) {
                        rows.push({ pid: 'default_' + i, name: '员工' + i });
                    }
                }
                
                rows.forEach(function(person) {
                    var demand = savedDemands.find(function(item) { return item.pid === person.pid; }) || {};
                    var workDaysValue = demand.workDays || 15;
                    var preferShift = demand.preferShift || '';
                    var preferColleagues = demand.preferColleagues || '';
                    html += '<tr>';
                    html += '<td>' + person.name + '</td>';
                    html += '<td><input type="number" min="0" max="' + daysInMonth + '" class="schedule-work-days" data-pid="' + person.pid + '" value="' + workDaysValue + '" style="width:100%;padding:5px;"></td>';
                    html += '<td><input type="text" class="schedule-rest-days" data-pid="' + person.pid + '" value="' + (demand.restDays || '') + '" placeholder="例：5,6,12,13" style="width:100%;padding:5px;"></td>';
                    html += '<td><select class="schedule-prefer-shift" data-pid="' + person.pid + '" style="width:100%;padding:5px;">';
                    html += '<option value="">不指定</option>';
                    html += '<option value="white"' + (preferShift === 'white' ? ' selected' : '') + '>前半月白班</option>';
                    html += '<option value="night"' + (preferShift === 'night' ? ' selected' : '') + '>前半月夜班</option>';
                    html += '</select></td>';
                    html += '<td><input type="text" class="schedule-prefer-colleagues" data-pid="' + person.pid + '" value="' + preferColleagues + '" placeholder="例：马泽,王晗" style="width:100%;padding:5px;"></td>';
                    html += '<td><button type="button" class="btn btn-xs btn-danger schedule-delete-demand" data-pid="' + person.pid + '"><i class="fa fa-trash"></i> 删除</button></td>';
                    html += '</tr>';
                });
                $('#schedule_demand_body').html(html);
                personList = rows;
                restoreRosterForMonth(month);
            },
            error: function(xhr, status, error) {
                console.error('加载人员列表失败:', error);
                var html = '';
                for (var i = 1; i <= 8; i++) {
                    var pid = 'default_' + i;
                    var demand = savedDemands.find(function(item) { return item.pid === pid; }) || {};
                    var workDaysValue = demand.workDays || 15;
                    html += '<tr>';
                    html += '<td>员工' + i + '</td>';
                    html += '<td><input type="number" min="0" max="' + daysInMonth + '" class="schedule-work-days" data-pid="' + pid + '" value="' + workDaysValue + '" style="width:100%;padding:5px;"></td>';
                    html += '<td><input type="text" class="schedule-rest-days" data-pid="' + pid + '" value="' + (demand.restDays || '') + '" placeholder="例：5,6,12,13" style="width:100%;padding:5px;"></td>';
                    html += '<td><button type="button" class="btn btn-xs btn-danger schedule-delete-demand" data-pid="' + pid + '"><i class="fa fa-trash"></i> 删除</button></td>';
                    html += '</tr>';
                }
                $('#schedule_demand_body').html(html);
                personList = [];
                for (var i = 1; i <= 8; i++) {
                    personList.push({ pid: 'default_' + i, name: '员工' + i });
                }
                restoreRosterForMonth(month);
            }
        });
    }
    
    // 绑定保存按钮事件 - 使用事件委托确保可靠性
    $(document).off('click', '#schedule_step1_save').on('click', '#schedule_step1_save', function() {
        console.log('点击保存并生成班表按钮');
        var month = $('#schedule_month').val();
        var demands = collectCurrentDemands();
        
        console.log('收集到的需求:', demands);
        
        if (demands.length === 0) {
            alert('请至少填写一个员工的需求');
            return;
        }
        
        saveDemandsForMonth(month, demands);
        saveSchedulePageState();
        
        var rules = {
            whiteDayPerDay: 2,
            nightShiftPerDay: 2,
            minConsecutiveDays: 2,
            maxConsecutiveDays: 5
        };
        
        console.log('开始生成班表...');
        generateRoster(demands, rules);
    });

    function generateRoster(demands, rules) {
        console.log('执行generateRoster函数');
        var persons = personList;
        if (persons.length === 0) {
            persons = [];
            for (var i = 1; i <= 8; i++) {
                persons.push({ pid: 'default_' + i, name: '员工' + i });
            }
        }
        
        var month = $('#schedule_month').val();
        var historyData = getHistoryForMonth(month);
        
        // 如果本地没有历史数据且刚刚发起了异步请求，需要等待数据加载完成
        // 这里使用简单的超时重试机制来模拟“等待”异步结果，避免阻塞UI
        if (!historyData && historySyncFlags[month]) {
            console.log('等待历史数据异步加载...');
            var checkInterval = setInterval(function() {
                var loadedData = JSON.parse(localStorage.getItem('schedule_history') || '{}')[month];
                if (loadedData || !historySyncFlags[month]) { // 数据加载成功 或 请求失败/超时
                    clearInterval(checkInterval);
                    // 无论是否加载到数据，都继续生成排班（如果没有历史数据，generateSchedule会处理null的情况）
                    performScheduleGeneration(persons, demands, rules);
                }
            }, 100);
            // 设置一个最长等待时间，防止无限等待
            setTimeout(function() {
                clearInterval(checkInterval);
                performScheduleGeneration(persons, demands, rules);
            }, 2000);
        } else {
            performScheduleGeneration(persons, demands, rules);
        }
    }
    
    function performScheduleGeneration(persons, demands, rules) {
        var roster = generateSchedule(persons, demands, rules);
        currentRoster = roster;
        renderRoster(roster);
        scheduleGenerated = true;
        generatedMonth = $('#schedule_month').val();
        saveRosterForMonth(generatedMonth, roster);
        saveSchedulePageState();
        $('#schedule_roster_section').show();
        
        $('html, body').animate({
            scrollTop: $('#schedule_roster_section').offset().top - 100
        }, 500);
        
        console.log('班表生成完成');
    }
    
    function generateSchedule(persons, demands, rules) {
        console.log('\n%c========== 开始分层递进式排班算法 v4.0 ==========', 'color: green; font-size: 16px; font-weight: bold;');
        console.log('persons数量: ' + (persons ? persons.length : 'null'));
        console.log('demands数量: ' + (demands ? demands.length : 'null'));
        console.log('rules: ', rules);
        
        var month = $('#schedule_month').val();
        var parts = month.split('-');
        var year = parseInt(parts[0], 10);
        var monthStr = parseInt(parts[1], 10);
        var daysInMonth = new Date(year, monthStr, 0).getDate();
        
        console.log('月份: ' + month + ', 天数: ' + daysInMonth);
        console.log('员工数量: ' + persons.length);
        
        try {
            // ===== 第零层：数据准备 =====
            console.log('\n[第零层] 数据准备...');
            var personRestDays = {};
            var demandsMap = {};
            demands.forEach(function(d) {
                personRestDays[d.pid] = d.restDays ? d.restDays.split(',').map(function(x) { return parseInt(x.trim()); }).filter(function(x) { return !isNaN(x); }) : [];
                demandsMap[d.pid] = d;
            });
            console.log('[第零层] 完成, personRestDays:', personRestDays);
            
            // ===== 第一层：月度配额计算（宏观均衡） =====
            console.log('\n===== 第一层：月度配额计算 =====');
            console.log('调用 calculateMonthlyQuotas...');
            var monthlyQuotas = calculateMonthlyQuotas(persons, demands, daysInMonth, month);
            console.log('月度配额计算结果:', monthlyQuotas);
            console.log('===== 第一层完成 =====\n');
            
            // ===== 第二层：连续块模式生成（已简化） =====
            console.log('\n===== 第二层：连续块模式生成 =====');
            console.log('调用 generateBlockTemplates...');
            var blockTemplates = generateBlockTemplates(persons, monthlyQuotas, daysInMonth, month);
            console.log('块模板生成结果:', blockTemplates);
            console.log('===== 第二层完成 =====\n');
            
            // ===== 第三层：逐日精排与冲突消解（微观分配） =====
            console.log('\n===== 第三层：逐日精排与冲突消解 =====');
            console.log('调用 performDailyScheduling...');
            var employees = performDailyScheduling(persons, demands, rules, daysInMonth, month, monthlyQuotas, blockTemplates, personRestDays);
            console.log('逐日精排结果: ' + employees.length + '人');
            console.log('===== 第三层完成 =====\n');
            
            // ===== 第四层：全局优化（启发式调整） =====
            console.log('\n===== 第四层：全局优化 =====');
            console.log('调用 globalOptimization...');
            employees = globalOptimization(employees, daysInMonth, rules);
            console.log('===== 第四层完成 =====\n');
            
            // ===== 第五层：统计与记忆更新 =====
            console.log('\n===== 第五层：统计与记忆更新 =====');
            console.log('调用 updateMemoryAndStatistics...');
            updateMemoryAndStatistics(employees, month, daysInMonth);
            console.log('===== 第五层完成 =====\n');
            
            // 构建返回结果
            var roster = {
                daysInMonth: daysInMonth,
                month: month,
                assignments: employees.reduce(function(acc, emp) {
                    acc[emp.pid] = emp.assignments;
                    return acc;
                }, {}),
                persons: employees
            };
            
            console.log('\n%c========== 排班算法完成 ==========', 'color: green; font-size: 16px; font-weight: bold;');
            console.log('生成结果: ' + employees.length + '人, ' + daysInMonth + '天');
            
            // 验证结果
            validateRoster(roster, rules);
            
            return roster;
            
        } catch (error) {
            console.error('%c排班算法执行出错:', 'color: red; font-size: 14px; font-weight: bold;', error);
            console.error('错误类型: ' + error.name);
            console.error('错误消息: ' + error.message);
            console.error('错误堆栈:', error.stack);
            
            // 尝试定位错误发生的位置
            if (error.message.indexOf('calculateMonthlyQuotas') !== -1) {
                console.error('❌ 第一层（月度配额计算）失败');
            } else if (error.message.indexOf('generateBlockTemplates') !== -1) {
                console.error('❌ 第二层（块模式生成）失败');
            } else if (error.message.indexOf('performDailyScheduling') !== -1) {
                console.error('❌ 第三层（逐日精排）失败');
            } else if (error.message.indexOf('globalOptimization') !== -1) {
                console.error('❌ 第四层（全局优化）失败');
            } else if (error.message.indexOf('updateMemoryAndStatistics') !== -1) {
                console.error('❌ 第五层（统计更新）失败');
            }
            
            alert('排班算法执行失败: ' + error.message + '\n\n请查看控制台获取详细错误信息。');
            throw error;
        }
    }
    
    // ===== 第三层:逐日精排(回归DeepSeek核心策略) =====
    
    // 主调度函数 - 块模板贪心放置 + 偏移策略 + 局部优化
    function performDailyScheduling(persons, demands, rules, daysInMonth, month, quotas, blockTemplates, personRestDays) {
        console.log('[第三层] 开始逐日精排(块模板+偏移策略)...');
        
        // 初始化员工状态
        var employees = persons.map(function(p) {
            return {
                pid: p.pid,
                name: p.name,
                assignments: {},
                whiteDaysAssigned: 0,
                nightDaysAssigned: 0,
                totalDaysAssigned: 0,
                restDaysAssigned: 0
            };
        });
        
        // 步骤1: 预处理强制休假
        console.log('[第三层-步骤1] 预处理强制休假...');
        var forcedRestMap = {};
        employees.forEach(function(emp) {
            forcedRestMap[emp.pid] = new Set();
            var restDays = personRestDays[emp.pid] || [];
            restDays.forEach(function(day) {
                if (day >= 1 && day <= daysInMonth) {
                    forcedRestMap[emp.pid].add(day);
                    emp.assignments[day] = 'rest';
                    emp.restDaysAssigned++;
                }
            });
        });
        
        // 步骤2: 基于块模板的贪心放置(带偏移)
        console.log('[第三层-步骤2] 块模板贪心放置(带偏移)...');
        var dailyCount = {};
        for (var d = 1; d <= daysInMonth; d++) {
            dailyCount[d] = {white: 0, night: 0};
        }
        
        // 关键:计算偏移量,让不同员工的块开始时间错开
        // 8个员工,31天,每人偏移约3-4天
        var offsetStep = Math.max(3, Math.floor(daysInMonth / persons.length));
        
        employees.forEach(function(emp, empIndex) {
            var template = blockTemplates[emp.pid];
            if (!template || !template.blocks || template.blocks.length === 0) {
                console.log('  ' + emp.name + ': 块模板为空,使用简单分配');
                simpleAssignment(emp, daysInMonth, quotas[emp.pid], forcedRestMap[emp.pid]);
                return;
            }
            
            // 计算该员工的起始偏移
            var startOffset = empIndex * offsetStep;
            console.log('  ' + emp.name + ': 偏移' + startOffset + '天, 块序列=' + template.blocks.map(function(b) {
                return b.type + ':' + b.length;
            }).join('->'));
            
            var blocks = template.blocks;
            var currentDay = 1 + startOffset;
            
            // 确保不超过月份天数
            if (currentDay > daysInMonth) {
                currentDay = 1; // 回绕到开头
            }
            
            // 依次执行每个块
            for (var blockIdx = 0; blockIdx < blocks.length; blockIdx++) {
                var block = blocks[blockIdx];
                var blockType = block.type;
                var blockLength = block.length;
                
                if (blockType === 'rest') {
                    // 休息块:直接跳过
                    currentDay += blockLength;
                    continue;
                }
                
                // 工作块:尝试连续放置
                var placed = 0;
                var attempts = 0;
                var maxAttempts = blockLength * 3; // 最多尝试3倍天数
                
                while (placed < blockLength && currentDay <= daysInMonth && attempts < maxAttempts) {
                    attempts++;
                    
                    // 跳过强制休息日
                    if (forcedRestMap[emp.pid].has(currentDay)) {
                        currentDay++;
                        continue;
                    }
                    
                    // 检查是否已被其他员工占用(每天最多2白2夜)
                    var shiftKey = blockType;
                    if (dailyCount[currentDay][shiftKey] < 2) {
                        // 可以放置
                        emp.assignments[currentDay] = blockType;
                        if (blockType === 'white') {
                            emp.whiteDaysAssigned++;
                            dailyCount[currentDay].white++;
                        } else {
                            emp.nightDaysAssigned++;
                            dailyCount[currentDay].night++;
                        }
                        emp.totalDaysAssigned++;
                        placed++;
                    }
                    
                    currentDay++;
                }
                
                console.log('    块[' + blockType + ':' + blockLength + '] 实际放置' + placed + '天');
            }
            
            // 填充剩余未安排的天数为休息
            for (var d = 1; d <= daysInMonth; d++) {
                if (!emp.assignments[d] && !forcedRestMap[emp.pid].has(d)) {
                    emp.assignments[d] = 'rest';
                    emp.restDaysAssigned++;
                }
            }
            
            console.log('  ' + emp.name + ': 白' + emp.whiteDaysAssigned + '夜' + emp.nightDaysAssigned + '休' + emp.restDaysAssigned);
        });
        
        // 步骤3: 冲突修复
        console.log('[第三层-步骤3] 冲突修复...');
        repairSchedule(employees, daysInMonth, dailyCount, forcedRestMap, quotas);
        
        // 步骤4: 局部优化
        console.log('[第三层-步骤4] 局部优化...');
        optimizeSchedule(employees, daysInMonth, forcedRestMap);
        
        console.log('[第三层] 逐日精排完成');
        return employees;
    }
    
    // 简单后备分配
    function simpleAssignment(emp, daysInMonth, quota, forcedRest) {
        var workDays = quota ? quota.totalWorkDays : 15;
        var whiteDays = quota ? quota.whiteDays : 8;
        var assigned = 0;
        
        for (var d = 1; d <= daysInMonth && assigned < workDays; d++) {
            if (forcedRest.has(d)) continue;
            if (assigned < whiteDays) {
                emp.assignments[d] = 'white';
                emp.whiteDaysAssigned++;
            } else {
                emp.assignments[d] = 'night';
                emp.nightDaysAssigned++;
            }
            emp.totalDaysAssigned++;
            assigned++;
        }
        
        for (var d = 1; d <= daysInMonth; d++) {
            if (!emp.assignments[d] && !forcedRest.has(d)) {
                emp.assignments[d] = 'rest';
                emp.restDaysAssigned++;
            }
        }
    }
    
    // 冲突修复:确保每天恰好2白2夜
    function repairSchedule(employees, daysInMonth, dailyCount, forcedRestMap, quotas) {
        console.log('  [冲突修复] 开始检查每日配额...');
        
        for (var day = 1; day <= daysInMonth; day++) {
            var adjusted = false;
            
            // 修复白班人数
            while (dailyCount[day].white < 2) {
                // 找一个当天休息且可以上白班的员工
                var found = false;
                for (var i = 0; i < employees.length; i++) {
                    var emp = employees[i];
                    if (!emp.assignments[day] || emp.assignments[day] === 'rest') {
                        if (!forcedRestMap[emp.pid].has(day) && emp.whiteDaysAssigned < (quotas[emp.pid] ? quotas[emp.pid].whiteDays + 1 : 10)) {
                            // 可以改为白班
                            var oldShift = emp.assignments[day];
                            emp.assignments[day] = 'white';
                            emp.whiteDaysAssigned++;
                            if (oldShift === 'night') emp.nightDaysAssigned--;
                            else emp.restDaysAssigned--;
                            dailyCount[day].white++;
                            if (oldShift === 'night') dailyCount[day].night--;
                            found = true;
                            adjusted = true;
                            break;
                        }
                    }
                }
                if (!found) break;
            }
            
            // 修复夜班人数
            while (dailyCount[day].night < 2) {
                var found = false;
                for (var i = 0; i < employees.length; i++) {
                    var emp = employees[i];
                    if (!emp.assignments[day] || emp.assignments[day] === 'rest') {
                        if (!forcedRestMap[emp.pid].has(day) && emp.nightDaysAssigned < (quotas[emp.pid] ? quotas[emp.pid].nightDays + 1 : 10)) {
                            var oldShift = emp.assignments[day];
                            emp.assignments[day] = 'night';
                            emp.nightDaysAssigned++;
                            if (oldShift === 'white') emp.whiteDaysAssigned--;
                            else emp.restDaysAssigned--;
                            dailyCount[day].night++;
                            if (oldShift === 'white') dailyCount[day].white--;
                            found = true;
                            adjusted = true;
                            break;
                        }
                    }
                }
                if (!found) break;
            }
            
            // 修复超额
            while (dailyCount[day].white > 2) {
                for (var i = employees.length - 1; i >= 0; i--) {
                    var emp = employees[i];
                    if (emp.assignments[day] === 'white') {
                        emp.assignments[day] = 'rest';
                        emp.whiteDaysAssigned--;
                        emp.restDaysAssigned++;
                        dailyCount[day].white--;
                        adjusted = true;
                        break;
                    }
                }
            }
            
            while (dailyCount[day].night > 2) {
                for (var i = employees.length - 1; i >= 0; i--) {
                    var emp = employees[i];
                    if (emp.assignments[day] === 'night') {
                        emp.assignments[day] = 'rest';
                        emp.nightDaysAssigned--;
                        emp.restDaysAssigned++;
                        dailyCount[day].night--;
                        adjusted = true;
                        break;
                    }
                }
            }
            
            if (adjusted && (dailyCount[day].white !== 2 || dailyCount[day].night !== 2)) {
                console.log('  [警告] 第' + day + '天修复后: 白班' + dailyCount[day].white + '/2, 夜班' + dailyCount[day].night + '/2');
            }
        }
        
        console.log('  [冲突修复] 完成');
    }
    
    // 局部搜索优化:爬山法改善连续性
    function optimizeSchedule(employees, daysInMonth, forcedRestMap) {
        console.log('  [局部优化] 开始爬山法优化(1000次迭代)...');
        
        // 评分函数 - 强化连续性权重
        function evaluate() {
            var score = 0;
            
            employees.forEach(function(emp) {
                // 获取该员工的排班序列
                var seq = [];
                for (var d = 1; d <= daysInMonth; d++) {
                    if (emp.assignments[d] === 'white') seq.push(1);
                    else if (emp.assignments[d] === 'night') seq.push(2);
                    else seq.push(0);
                }
                
                // 计算连续块
                var currentType = seq[0];
                var currentLen = 1;
                var switches = 0;
                var lastWorkType = null;
                
                for (var i = 1; i < seq.length; i++) {
                    if (seq[i] === currentType) {
                        currentLen++;
                    } else {
                        // 评分:工作或休息块长度3-4最佳
                        var isWork = currentType !== 0;
                        if (isWork) {
                            if (currentLen >= 3 && currentLen <= 4) score += 20;  // 提高奖励
                            else if (currentLen === 2 || currentLen === 5) score += 10;
                            else if (currentLen >= 6) score -= 30;  // 强烈惩罚超长
                            else score -= 10;  // 惩罚碎片化
                        } else {
                            if (currentLen >= 3 && currentLen <= 4) score += 15;
                            else if (currentLen === 2 || currentLen === 5) score += 8;
                            else if (currentLen >= 6) score -= 20;
                            else score -= 5;
                        }
                        
                        // 计算切换次数
                        if (currentType !== 0) {
                            if (lastWorkType !== null && currentType !== lastWorkType) {
                                switches++;
                            }
                            lastWorkType = currentType;
                        }
                        
                        currentType = seq[i];
                        currentLen = 1;
                    }
                }
                // 处理最后一个块
                var isWork = currentType !== 0;
                if (isWork) {
                    if (currentLen >= 3 && currentLen <= 4) score += 20;
                    else if (currentLen === 2 || currentLen === 5) score += 10;
                    else if (currentLen >= 6) score -= 30;
                    else score -= 10;
                } else {
                    if (currentLen >= 3 && currentLen <= 4) score += 15;
                    else if (currentLen === 2 || currentLen === 5) score += 8;
                    else if (currentLen >= 6) score -= 20;
                    else score -= 5;
                }
                
                // 切换次数惩罚(更严格)
                score -= switches * 30;
            });
            
            return score;
        }
        
        var bestScore = evaluate();
        console.log('    初始评分: ' + bestScore);
        
        // 随机尝试交换2000次(增加迭代次数)
        var bestAssignments = JSON.parse(JSON.stringify(employees.map(function(e) { return e.assignments; })));
        
        for (var iter = 0; iter < 2000; iter++) {
            var day = Math.floor(Math.random() * daysInMonth) + 1;
            
            // 找到当天上班的两个员工
            var workers = [];
            employees.forEach(function(emp) {
                if (emp.assignments[day] === 'white' || emp.assignments[day] === 'night') {
                    workers.push(emp);
                }
            });
            
            if (workers.length < 2) continue;
            
            // 随机选两个员工
            var idx1 = Math.floor(Math.random() * workers.length);
            var idx2 = Math.floor(Math.random() * workers.length);
            while (idx2 === idx1) idx2 = Math.floor(Math.random() * workers.length);
            
            var empA = workers[idx1];
            var empB = workers[idx2];
            
            var shiftA = empA.assignments[day];
            var shiftB = empB.assignments[day];
            
            if (shiftA === shiftB) continue; // 同类型交换无意义
            
            // 执行交换
            empA.assignments[day] = shiftB;
            empB.assignments[day] = shiftA;
            
            // 检查硬约束
            var valid = true;
            if (forcedRestMap[empA.pid].has(day) || forcedRestMap[empB.pid].has(day)) {
                valid = false;
            }
            
            if (valid) {
                var newScore = evaluate();
                if (newScore > bestScore) {
                    bestScore = newScore;
                    bestAssignments = JSON.parse(JSON.stringify(employees.map(function(e) { return e.assignments; })));
                } else {
                    // 回退
                    empA.assignments[day] = shiftA;
                    empB.assignments[day] = shiftB;
                }
            } else {
                // 回退
                empA.assignments[day] = shiftA;
                empB.assignments[day] = shiftB;
            }
            
            if (iter % 500 === 0) {
                console.log('    迭代' + iter + '/2000, 当前最佳评分: ' + bestScore);
            }
        }
        
        // 恢复最佳方案
        employees.forEach(function(emp, idx) {
            emp.assignments = bestAssignments[idx];
        });
        
        console.log('    最终评分: ' + bestScore);
        console.log('  [局部优化] 完成');
    }

    // 计算连续性评分
    function calculateContinuityScore(emp, daysInMonth) {
        var score = 0;
        var consecutive = 0;
        
        for (var day = 1; day <= daysInMonth; day++) {
            if (emp.assignments[day] === 'white' || emp.assignments[day] === 'night') {
                consecutive++;
                if (consecutive >= 2 && consecutive <= 4) {
                    score += 100; // 连续2-4天奖励
                } else if (consecutive > 5) {
                    score -= 500; // 连续超过5天惩罚
                }
            } else {
                consecutive = 0;
            }
        }
        
        return score;
    }

    // ===== 新增：跨月记忆管理函数 =====
    
    // 获取跨月记忆数据
    function getCrossMonthMemory() {
        var memory = JSON.parse(localStorage.getItem('cross_month_memory') || '{}');
        if (!memory.lastOddMonthExtraWorkers) {
            memory.lastOddMonthExtraWorkers = [];
        }
        if (!memory.shiftBalances) {
            memory.shiftBalances = {};
        }
        if (!memory.lastMonthEndStates) {
            memory.lastMonthEndStates = {};
        }
        return memory;
    }
    
    // 保存跨月记忆数据
    function saveCrossMonthMemory(memoryData) {
        localStorage.setItem('cross_month_memory', JSON.stringify(memoryData));
    }
    
    // 获取上月末状态
    function getPreviousMonthState(month, emp) {
        var memoryData = getCrossMonthMemory();
        var pid = emp.pid || emp;
        
        if (memoryData.lastMonthEndStates[pid]) {
            return memoryData.lastMonthEndStates[pid];
        }
        
        // 如果没有记忆数据，尝试从历史排班中读取
        var prevMonth = getPreviousMonth(month);
        var history = getHistoryForMonth(prevMonth);
        if (!history || !history.assignments || !history.assignments[pid]) {
            return { lastShift: '', consecutive: 0 };
        }
        
        var assignments = history.assignments[pid];
        var days = Object.keys(assignments).map(function(day) { return parseInt(day, 10); }).sort(function(a, b) { return a - b; });
        var lastDay = days[days.length - 1];
        if (!lastDay) return { lastShift: '', consecutive: 0 };
        var lastValue = assignments[lastDay];
        if (lastValue !== '白班' && lastValue !== '夜班') return { lastShift: '', consecutive: 0 };
        var consecutive = 1;
        for (var i = lastDay - 1; i >= 1; i--) {
            if (assignments[i] === lastValue) {
                consecutive++;
            } else {
                break;
            }
        }
        return { lastShift: lastValue === '白班' ? 'white' : 'night', consecutive: consecutive };
    }
    
    // ===== 新增：分层递进式排班算法核心函数 =====
    
    // 第一层：月度配额计算
    function calculateMonthlyQuotas(persons, demands, daysInMonth, month) {
        var quotas = {};
        var isOddMonth = (daysInMonth % 2 !== 0);
        
        // 获取跨月记忆数据
        var memoryData = getCrossMonthMemory();
        var lastOddMonthExtraWorkers = memoryData.lastOddMonthExtraWorkers || [];
        var shiftBalances = memoryData.shiftBalances || {};
        
        console.log('本月天数: ' + daysInMonth + (isOddMonth ? ' (奇数)' : ' (偶数)'));
        
        var extraWorkers = [];
        
        if (!isOddMonth) {
            // 偶数天：每人 D/2 天
            persons.forEach(function(p) {
                quotas[p.pid] = {
                    totalWorkDays: Math.floor(daysInMonth / 2),
                    whiteDays: 0,
                    nightDays: 0,
                    restDays: daysInMonth - Math.floor(daysInMonth / 2)
                };
            });

        } else {
            // 奇数天：4人多上1天，其余少上1天
            var workDaysMore = Math.ceil(daysInMonth / 2);
            var workDaysLess = Math.floor(daysInMonth / 2);
            
            var allPids = persons.map(function(p) { return p.pid; });
            var notExtraLastMonth = allPids.filter(function(pid) {
                return lastOddMonthExtraWorkers.indexOf(pid) === -1;
            });
            
            if (notExtraLastMonth.length < 4) {
                extraWorkers = allPids.slice(0, 4);
            } else {
                extraWorkers = notExtraLastMonth.slice(0, 4);
            }
            
            console.log('奇数天，以下4人多上1天 (' + workDaysMore + '天): ' + extraWorkers.join(', '));
            
            persons.forEach(function(p) {
                var isExtra = extraWorkers.indexOf(p.pid) !== -1;
                var workDays = isExtra ? workDaysMore : workDaysLess;
                
                quotas[p.pid] = {
                    totalWorkDays: workDays,
                    whiteDays: 0,
                    nightDays: 0,
                    restDays: daysInMonth - workDays
                };
            });
            
            memoryData.lastOddMonthExtraWorkers = extraWorkers;
        }
        
        // 确定每人白/夜班配额
        var demandsMap = {};
        demands.forEach(function(d) { demandsMap[d.pid] = d; });
        
        persons.forEach(function(p) {
            var quota = quotas[p.pid];
            var W = quota.totalWorkDays;
            
            if (W % 2 === 0) {
                quota.whiteDays = W / 2;
                quota.nightDays = W / 2;
            } else {
                var balance = shiftBalances[p.pid] || 0;
                
                if (balance > 0) {
                    quota.nightDays = Math.ceil(W / 2);
                    quota.whiteDays = Math.floor(W / 2);
                    console.log(p.name + ': 历史白班多' + balance + '天，本月安排夜班多1天 (白' + quota.whiteDays + '/夜' + quota.nightDays + ')');
                } else if (balance < 0) {
                    quota.whiteDays = Math.ceil(W / 2);
                    quota.nightDays = Math.floor(W / 2);
                    console.log(p.name + ': 历史夜班多' + (-balance) + '天，本月安排白班多1天 (白' + quota.whiteDays + '/夜' + quota.nightDays + ')');
                } else {
                    var demand = demandsMap[p.pid];
                    if (demand && demand.preferShift === 'white') {
                        quota.whiteDays = Math.ceil(W / 2);
                        quota.nightDays = Math.floor(W / 2);
                    } else if (demand && demand.preferShift === 'night') {
                        quota.nightDays = Math.ceil(W / 2);
                        quota.whiteDays = Math.floor(W / 2);
                    } else {
                        if (Math.random() > 0.5) {
                            quota.whiteDays = Math.ceil(W / 2);
                            quota.nightDays = Math.floor(W / 2);
                        } else {
                            quota.nightDays = Math.ceil(W / 2);
                            quota.whiteDays = Math.floor(W / 2);
                        }
                    }
                }
            }
        });
        
        saveCrossMonthMemory(memoryData);
        
        console.log('月度配额计算完成');
        return quotas;
    }
    
    // 第二层：连续块模式生成
    function generateBlockTemplates(persons, quotas, daysInMonth, month) {
        var templates = {};
        
        persons.forEach(function(p) {
            var quota = quotas[p.pid];
            var WD = quota.whiteDays;
            var ND = quota.nightDays;
            var RD = quota.restDays;
            var prevState = getPreviousMonthState(month, p.pid);
            
            console.log(p.name + ': 白班' + WD + '天, 夜班' + ND + '天, 休息' + RD + '天');
            
            var blocks = createOptimalBlocks(WD, ND, RD, prevState);
            templates[p.pid] = {
                blocks: blocks,
                totalDays: blocks.reduce(function(sum, b) { return sum + b.length; }, 0)
            };
            
            console.log('  块模板: ' + blocks.map(function(b) { 
                return '(' + b.type + ',' + b.length + ')'; 
            }).join(' -> '));
        });
        
        return templates;
    }
    
    // 创建最优块序列 - 重新设计:采用"休息-白班-休息-夜班-休息"的模式
    function createOptimalBlocks(whiteDays, nightDays, restDays, prevState) {
        var blocks = [];
        
        // DeepSeek的智能拆分策略:优先拆分成3-4天的块
        function preferredBlockLength(total) {
            if (total <= 0) return [];
            var result = [];
            var remaining = total;
            
            while (remaining > 0) {
                if (remaining >= 8) {
                    result.push(4, 4);
                    remaining -= 8;
                } else if (remaining >= 7) {
                    result.push(4, 3);
                    remaining -= 7;
                } else if (remaining >= 6) {
                    result.push(3, 3);
                    remaining -= 6;
                } else if (remaining >= 5) {
                    result.push(5);
                    remaining -= 5;
                } else if (remaining >= 4) {
                    result.push(4);
                    remaining -= 4;
                } else if (remaining >= 3) {
                    result.push(3);
                    remaining -= 3;
                } else if (remaining >= 2) {
                    result.push(2);
                    remaining -= 2;
                } else {
                    result.push(1);
                    remaining -= 1;
                }
            }
            
            return result;
        }
        
        // 将休息天分成三部分:开头、中间、结尾
        var restStart = Math.floor(restDays * 0.3);
        var restMiddle = Math.floor(restDays * 0.4);
        var restEnd = restDays - restStart - restMiddle;
        
        var restStartBlocks = preferredBlockLength(restStart);
        var restMiddleBlocks = preferredBlockLength(restMiddle);
        var restEndBlocks = preferredBlockLength(restEnd);
        
        var whiteBlocks = preferredBlockLength(whiteDays);
        var nightBlocks = preferredBlockLength(nightDays);
        
        // 构建块序列: 休息(开头) -> 白班 -> 休息(中间) -> 夜班 -> 休息(结尾)
        restStartBlocks.forEach(function(len) {
            blocks.push({type: 'rest', length: len});
        });
        whiteBlocks.forEach(function(len) {
            blocks.push({type: 'white', length: len});
        });
        restMiddleBlocks.forEach(function(len) {
            blocks.push({type: 'rest', length: len});
        });
        nightBlocks.forEach(function(len) {
            blocks.push({type: 'night', length: len});
        });
        restEndBlocks.forEach(function(len) {
            blocks.push({type: 'rest', length: len});
        });
        
        // 验证总天数
        var totalDays = blocks.reduce(function(sum, b) { return sum + b.length; }, 0);
        var targetTotal = whiteDays + nightDays + restDays;
        
        if (totalDays !== targetTotal && blocks.length > 0) {
            var diff = targetTotal - totalDays;
            var lastBlock = blocks[blocks.length - 1];
            if (lastBlock.type === 'rest') {
                lastBlock.length += diff;
            }
        }
        
        return blocks;
    }
    
    function renderRoster(roster) {
        console.log('渲染班表...');
        
        var daysInMonth = roster.daysInMonth;
        
        // 优化表头:固定所有列宽,确保一致性
        var headHtml = '<tr>';

        for (var i = 1; i <= daysInMonth; i++) {
            headHtml += '<th style="width:60px;min-width:60px;max-width:60px;text-align:center;">' + i + '</th>';
        }
        headHtml += '</tr>';
        $('#schedule_roster_head').html(headHtml);

        // 优化表体:统一所有单元格宽度
        var bodyHtml = '';
        roster.persons.forEach(function(emp) {
            bodyHtml += '<tr>';
            bodyHtml += '<td style="width:120px;min-width:120px;max-width:120px;font-weight:bold;background:#f7f7f7;">' + emp.name + '</td>';
            
            for (var day = 1; day <= daysInMonth; day++) {
                var assignment = emp.assignments[day] || 'rest';
                var displayText = assignment;
                var bgColor = '#d9edf7';
                var textColor = '#333';
                
                // 映射英文到中文
                if (assignment === 'white') {
                    displayText = '白班';
                    bgColor = '#f0ad4e';
                    textColor = '#fff';
                } else if (assignment === 'night') {
                    displayText = '夜班';
                    bgColor = '#d9534f';
                    textColor = '#fff';
                } else if (assignment === 'rest') {
                    displayText = '休息';
                    bgColor = '#d9edf7';
                    textColor = '#333';
                }
                
                bodyHtml += '<td style="width:60px;min-width:60px;max-width:60px;height:32px;background:' + bgColor + ';color:' + textColor + ';text-align:center;vertical-align:middle;white-space:nowrap;overflow:hidden;">' + displayText + '</td>';
            }
            bodyHtml += '</tr>';
        });
        $('#schedule_roster_body').html(bodyHtml);
        console.log('班表渲染完成');
        
        // 启用导出按钮
        $('#schedule_export_btn').prop('disabled', false);
        
        // 显示"保存到历史排班"按钮
        $('#schedule_save_to_history_btn').show();
    }

    $(document).off('change', '#schedule_month').on('change', '#schedule_month', function() {
        scheduleGenerated = false;
        generatedMonth = null;
        currentRoster = null;
        $('#schedule_roster_section').hide();
        $('#schedule_export_btn').prop('disabled', true); // 禁用导出按钮
        $('#schedule_save_to_history_btn').hide(); // 隐藏保存按钮
        loadPersonList();
        saveSchedulePageState();
        
        // 计算并显示推荐天数
        updateRecommendedWorkDays();
    });

    // 计算并显示推荐上班天数
    function updateRecommendedWorkDays() {
        var month = $('#schedule_month').val();
        if (!month) return;
        
        var parts = month.split('-');
        var year = parseInt(parts[0], 10);
        var monthNum = parseInt(parts[1], 10);
        var daysInMonth = new Date(year, monthNum, 0).getDate();
        
        // 假设每天需要2个白班+2个夜班=4个班次
        var totalSlotsPerDay = 4;
        var totalSlotsInMonth = daysInMonth * totalSlotsPerDay;
        
        // 假设8个员工
        var employeeCount = 8;
        
        // 计算每人平均上班天数
        var avgWorkDays = Math.floor(totalSlotsInMonth / employeeCount);
        var remainder = totalSlotsInMonth % employeeCount;
        
        // 显示推荐信息
        $('#schedule_days_count').text(daysInMonth);
        $('#schedule_recommend_days').text(avgWorkDays + (remainder > 0 ? '-' + (avgWorkDays + 1) : ''));
        
        var note = '';
        if (remainder === 0) {
            note = '每人' + avgWorkDays + '天正好铺满全月';
        } else {
            note = remainder + '人上' + (avgWorkDays + 1) + '天，' + (employeeCount - remainder) + '人上' + avgWorkDays + '天';
        }
        $('#schedule_recommend_note').text(note);
        
        $('#schedule_recommend_info').show();
        
        console.log('========== 推荐上班天数 ==========');
        console.log('月份：' + month);
        console.log('本月天数：' + daysInMonth + '天');
        console.log('每天班次数：' + totalSlotsPerDay + '个（2白+2夜）');
        console.log('总班次数：' + totalSlotsInMonth + '个');
        console.log('员工数量：' + employeeCount + '人');
        console.log('平均每人：' + avgWorkDays + '天，余数：' + remainder + '天');
        console.log('推荐方案：' + note);
        console.log('==================================');
    }

    $(document).off('click', '#schedule_demand_body').on('click', '#schedule_demand_body', '.schedule-delete-demand', function() {
        var pid = $(this).data('pid');
        $(this).closest('tr').remove();
        var demands = collectCurrentDemands();
        saveDemandsForMonth($('#schedule_month').val(), demands);
        saveSchedulePageState();
    });

    $(document).off('click', '#schedule_export_btn').on('click', '#schedule_export_btn', function() {
        if (!scheduleGenerated || !currentRoster) {
            alert('请先生成班表！');
            return;
        }

        var month = $('#schedule_month').val();
        var exportData = [];
        var daysInMonth = currentRoster.daysInMonth;
        
        var header = ['姓名'];
        for (var i = 1; i <= daysInMonth; i++) {
            header.push(i + '日');
        }
        exportData.push(header);

        currentRoster.persons.forEach(function(emp) {
            var row = [emp.name || emp.pid];
            for (var day = 1; day <= daysInMonth; day++) {
                var assignment = emp.assignments[day] || '休息';
                row.push(assignment);
            }
            exportData.push(row);
        });

        // 显示加载提示
        $('#schedule_export_btn').prop('disabled', true);
        $('#export_loading').show();

        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/FinalScheduler/export/schedule', true);
        xhr.responseType = 'blob';
        xhr.setRequestHeader('Content-Type', 'application/json');

        xhr.onload = function() {
            // 隐藏加载提示
            $('#schedule_export_btn').prop('disabled', false);
            $('#export_loading').hide();

            if (this.status === 200) {
                var blob = this.response;
                var url = window.URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = month + '_班表.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                console.log('导出成功');
            } else {
                console.error('导出失败: Status ' + this.status);
                alert('导出班表失败，请稍后重试！');
            }
        };

        xhr.onerror = function() {
            // 隐藏加载提示
            $('#schedule_export_btn').prop('disabled', false);
            $('#export_loading').hide();

            console.error('导出请求网络错误');
            alert('导出班表失败，请检查网络连接！');
        };

        xhr.send(JSON.stringify({
            month: month,
            data: exportData
        }));
    });

    // 保存到历史排班
    $(document).on('click', '#schedule_save_to_history_btn', function() {
        if (!currentRoster) {
            alert('请先生成班表');
            return;
        }
        
        var month = $('#schedule_month').val();
        
        // 确认对话框
        if (!confirm('确定要将 ' + month + ' 的排班数据保存到历史排班吗？\n\n保存到历史排班后，该数据将作为正式存档。')) {
            return;
        }
        
        // 将currentRoster转换为历史排班格式
        var historyData = {
            month: month,
            assignments: {}
        };
        
        currentRoster.persons.forEach(function(emp) {
            historyData.assignments[emp.pid] = emp.assignments;
        });
        
        console.log('========== 保存到历史排班 ==========');
        console.log('月份:', month);
        console.log('数据:', historyData);
        
        // 保存到localStorage
        var all = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        all[month] = historyData;
        localStorage.setItem('schedule_history', JSON.stringify(all));
        
        // 异步保存到后端
        $.ajax({
            url: '/FinalScheduler/api/saveHistory',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                month: month,
                history: historyData
            }),
            success: function(response) {
                console.log('历史排班保存成功:', response);
                alert('✓ 保存成功！\n\n' + month + ' 的排班数据已保存到历史排班。');
            },
            error: function(xhr, status, error) {
                console.error('后端保存失败:', error);
                alert('保存到服务器失败，但数据已保存在浏览器本地。\n\n错误：' + error);
            }
        });
    });

    // 隐藏保存按钮（当月份改变或生成新班表前）
    $('#schedule_month').change(function() {
        $('#schedule_save_to_history_btn').hide();
    });

    console.log('初始化排班管理页面');
    restorePageState();
    loadPersonList();
});
</script>
