<div class="header">
    <div class="stats">
    </div>
    <h1 class="page-title">排班管理</h1>
    <ul class="breadcrumb">
        <li><a href="./">Home</a> </li>
        <li class="active">排班管理</li>
    </ul>
</div>

<div class="main-content">
    <div id="schedule_step1" class="schedule-step">
        <h3>员工假期需求</h3>
        <p>记录员工在指定月份内需要休息的具体日期，保存后将自动生成班表</p>
        <div style="margin: 20px 0;">
            <label>选择月份：</label>
            <input type="month" id="schedule_month" style="padding:5px 10px;font-size:14px;">
            <span id="schedule_recommend_info" style="margin-left:20px;color:#17a2b8;font-weight:bold;display:none;">
                <i class="fa fa-lightbulb-o"></i> 
                推荐：本月共 <span id="schedule_days_count"></span> 天，建议每人上班 <span id="schedule_recommend_days"></span> 天（<span id="schedule_recommend_note"></span>）
            </span>
        </div>
        <table id="schedule_demand_table" class="table table-bordered" style="margin-top:20px;">
            <thead>
                <tr>
                    <th style="width:15%;">员工姓名</th>
                    <th style="width:12%;">本月上班天数</th>
                    <th style="width:18%;">休息日期（可多选，用逗号分隔）</th>
                    <th style="width:15%;">偏好班次（选填）</th>
                    <th style="width:20%;">希望一起上班的同事（选填，用逗号分隔）</th>
                    <th style="width:20%;">操作</th>
                </tr>
            </thead>
            <tbody id="schedule_demand_body">
            </tbody>
        </table>
        <button type="button" id="schedule_step1_save" class="btn btn-success" style="margin-top:10px;">
            <i class="fa fa-save"></i> 保存并生成班表
        </button>
    </div>
    
    <div id="schedule_roster_section" style="display:none; margin-top:30px;">
        <h3>生成的班表</h3>
        <div id="schedule_roster_container" style="overflow-x:auto; margin-top:20px; max-height:600px;">
            <table id="schedule_roster_table" class="table table-bordered table-condensed" style="border-collapse:collapse;width:100%;font-size:12px;">
                <thead id="schedule_roster_head"></thead>
                <tbody id="schedule_roster_body"></tbody>
            </table>
        </div>
        <button type="button" id="schedule_export_btn" class="btn btn-info" style="margin-top:20px;" disabled>
            <i class="fa fa-download"></i> 导出班表
        </button>
        <button type="button" id="schedule_save_to_history_btn" class="btn btn-success" style="margin-top:20px;margin-left:10px;display:none;">
            <i class="fa fa-save"></i> 保存到历史排班
        </button>
        <span id="export_loading" style="display:none; margin-left:10px; color:#999;">
            <i class="fa fa-spinner fa-spin"></i> 正在导出...
        </span>
    </div>
</div>

<script type="text/javascript">
$(function() {
    console.log('排班管理页面加载...');
    var currentMonth = new Date().toISOString().substring(0, 7);
    $('#schedule_month').val(currentMonth);
    
    var scheduleGenerated = false;
    var generatedMonth = null;
    var personList = [];
    var currentRoster = null;
    
    // 同步标志，避免重复请求
    var historySyncFlags = {};

    function getSchedulePageState() {
        return JSON.parse(localStorage.getItem('schedule_page_state') || '{}');
    }

    function saveSchedulePageState() {
        var state = {
            selectedMonth: $('#schedule_month').val(),
            generatedMonth: generatedMonth,
            scheduleGenerated: scheduleGenerated
        };
        localStorage.setItem('schedule_page_state', JSON.stringify(state));
    }

    function getSavedRosterForMonth(month) {
        // 优先从 schedule_roster 读取
        var all = JSON.parse(localStorage.getItem('schedule_roster') || '{}');
        if (all[month]) {
            return all[month];
        }
        
        // 如果没有，尝试从 schedule_history 恢复（兼容旧数据）
        var history = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        var historyData = history[month];
        if (historyData && historyData.assignments) {
            // 将历史数据转换为 roster 格式
            var persons = [];
            Object.keys(historyData.assignments).forEach(function(pid) {
                persons.push({
                    pid: pid,
                    name: pid,
                    assignments: historyData.assignments[pid]
                });
            });
            
            var year = parseInt(month.split('-')[0], 10);
            var monthNum = parseInt(month.split('-')[1], 10);
            var daysInMonth = new Date(year, monthNum, 0).getDate();
            
            return {
                month: month,
                daysInMonth: daysInMonth,
                persons: persons
            };
        }
        
        return null;
    }

    function saveRosterForMonth(month, roster) {
        var all = JSON.parse(localStorage.getItem('schedule_roster') || '{}');
        all[month] = roster;
        localStorage.setItem('schedule_roster', JSON.stringify(all));
        
        // 同时保存到历史排班，确保历史数据不丢失
        var history = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        var historyData = {
            month: month,
            assignments: {}
        };
        
        if (roster && roster.persons) {
            roster.persons.forEach(function(emp) {
                historyData.assignments[emp.pid] = emp.assignments || {};
            });
        }
        
        history[month] = historyData;
        localStorage.setItem('schedule_history', JSON.stringify(history));
    }

    function collectCurrentDemands() {
        var month = $('#schedule_month').val();
        var demands = [];
        $('#schedule_demand_body tr').each(function() {
            var pid = $(this).find('.schedule-work-days').data('pid');
            var restDays = $(this).find('.schedule-rest-days').val();
            var workDays = parseInt($(this).find('.schedule-work-days').val(), 10);
            var preferShift = $(this).find('.schedule-prefer-shift').val();
            var preferColleagues = $(this).find('.schedule-prefer-colleagues').val();
            if (isNaN(workDays) || workDays < 0) workDays = 15;
            demands.push({
                pid: pid,
                month: month,
                restDays: restDays,
                workDays: workDays,
                preferShift: preferShift,
                preferColleagues: preferColleagues
            });
        });
        return demands;
    }

    function restorePageState() {
        var state = getSchedulePageState();
        if (state.selectedMonth) {
            $('#schedule_month').val(state.selectedMonth);
            currentMonth = state.selectedMonth;
        }
    }

    function restoreRosterForMonth(month) {
        var savedRoster = getSavedRosterForMonth(month);
        if (savedRoster) {
            currentRoster = savedRoster;
            renderRoster(savedRoster);
            scheduleGenerated = true;
            generatedMonth = month;
            $('#schedule_roster_section').show();
        }
    }

    function getSavedDemandsForMonth(month) {
        var all = JSON.parse(localStorage.getItem('schedule_demands') || '{}');
        return all[month] || [];
    }

    function saveDemandsForMonth(month, demands) {
        var all = JSON.parse(localStorage.getItem('schedule_demands') || '{}');
        all[month] = demands;
        localStorage.setItem('schedule_demands', JSON.stringify(all));
    }

    function getHistoryForMonth(month) {
        var all = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        
        // 如果localStorage中有数据，直接返回
        if (all[month]) {
            return all[month];
        }
        
        // 如果还没有同步过，尝试从后端异步加载
        if (!historySyncFlags[month]) {
            historySyncFlags[month] = true; // 标记为已请求
            
            $.ajax({
                url: '/FinalScheduler/api/loadHistory?month=' + month,
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response && response.history) {
                        console.log('从后端异步加载历史数据到排班页面:', month);
                        // 同步到localStorage
                        var currentAll = JSON.parse(localStorage.getItem('schedule_history') || '{}');
                        currentAll[month] = response.history;
                        localStorage.setItem('schedule_history', JSON.stringify(currentAll));
                    }
                },
                error: function(xhr, status, error) {
                    console.log('后端没有' + month + '的历史数据或加载失败:', error);
                }
            });
        }
        
        // 直接返回localStorage中的数据（如果没有则为null）
        // 后端异步加载完成后会自动更新localStorage，下次调用时即可获取
        return all[month] || null;
    }

    function getPreviousMonth(month) {
        var parts = month.split('-');
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        m--;
        if (m < 1) { y--; m = 12; }
        return y + '-' + (m < 10 ? '0' + m : m);
    }

    function loadPersonList() {
        var month = $('#schedule_month').val();
        var savedDemands = getSavedDemandsForMonth(month);
        var [year, monthStr] = month.split('-');
        var daysInMonth = new Date(year, monthStr, 0).getDate();
        
        console.log('加载人员列表...');
        $.ajax({
            url: '/FinalScheduler/queryPerson',
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                console.log('人员数据:', data);
                var html = '';
                var rows = data.slice();
                if (rows.length === 0) {
                    for (var i = 1; i <= 8; i++) {
                        rows.push({ pid: 'default_' + i, name: '员工' + i });
                    }
                }
                
                rows.forEach(function(person) {
                    var demand = savedDemands.find(function(item) { return item.pid === person.pid; }) || {};
                    var workDaysValue = demand.workDays || 15;
                    var preferShift = demand.preferShift || '';
                    var preferColleagues = demand.preferColleagues || '';
                    html += '<tr>';
                    html += '<td>' + person.name + '</td>';
                    html += '<td><input type="number" min="0" max="' + daysInMonth + '" class="schedule-work-days" data-pid="' + person.pid + '" value="' + workDaysValue + '" style="width:100%;padding:5px;"></td>';
                    html += '<td><input type="text" class="schedule-rest-days" data-pid="' + person.pid + '" value="' + (demand.restDays || '') + '" placeholder="例：5,6,12,13" style="width:100%;padding:5px;"></td>';
                    html += '<td><select class="schedule-prefer-shift" data-pid="' + person.pid + '" style="width:100%;padding:5px;">';
                    html += '<option value="">不指定</option>';
                    html += '<option value="white"' + (preferShift === 'white' ? ' selected' : '') + '>前半月白班</option>';
                    html += '<option value="night"' + (preferShift === 'night' ? ' selected' : '') + '>前半月夜班</option>';
                    html += '</select></td>';
                    html += '<td><input type="text" class="schedule-prefer-colleagues" data-pid="' + person.pid + '" value="' + preferColleagues + '" placeholder="例：马泽,王晗" style="width:100%;padding:5px;"></td>';
                    html += '<td><button type="button" class="btn btn-xs btn-danger schedule-delete-demand" data-pid="' + person.pid + '"><i class="fa fa-trash"></i> 删除</button></td>';
                    html += '</tr>';
                });
                $('#schedule_demand_body').html(html);
                personList = rows;
                restoreRosterForMonth(month);
            },
            error: function(xhr, status, error) {
                console.error('加载人员列表失败:', error);
                var html = '';
                for (var i = 1; i <= 8; i++) {
                    var pid = 'default_' + i;
                    var demand = savedDemands.find(function(item) { return item.pid === pid; }) || {};
                    var workDaysValue = demand.workDays || 15;
                    html += '<tr>';
                    html += '<td>员工' + i + '</td>';
                    html += '<td><input type="number" min="0" max="' + daysInMonth + '" class="schedule-work-days" data-pid="' + pid + '" value="' + workDaysValue + '" style="width:100%;padding:5px;"></td>';
                    html += '<td><input type="text" class="schedule-rest-days" data-pid="' + pid + '" value="' + (demand.restDays || '') + '" placeholder="例：5,6,12,13" style="width:100%;padding:5px;"></td>';
                    html += '<td><button type="button" class="btn btn-xs btn-danger schedule-delete-demand" data-pid="' + pid + '"><i class="fa fa-trash"></i> 删除</button></td>';
                    html += '</tr>';
                }
                $('#schedule_demand_body').html(html);
                personList = [];
                for (var i = 1; i <= 8; i++) {
                    personList.push({ pid: 'default_' + i, name: '员工' + i });
                }
                restoreRosterForMonth(month);
            }
        });
    }
    
    // 绑定保存按钮事件 - 使用事件委托确保可靠性
    $(document).off('click', '#schedule_step1_save').on('click', '#schedule_step1_save', function() {
        console.log('点击保存并生成班表按钮');
        var month = $('#schedule_month').val();
        var demands = collectCurrentDemands();
        
        console.log('收集到的需求:', demands);
        
        if (demands.length === 0) {
            alert('请至少填写一个员工的需求');
            return;
        }
        
        saveDemandsForMonth(month, demands);
        saveSchedulePageState();
        
        var rules = {
            whiteDayPerDay: 2,
            nightShiftPerDay: 2,
            minConsecutiveDays: 2,
            maxConsecutiveDays: 5
        };
        
        console.log('开始生成班表...');
        generateRoster(demands, rules);
    });

    function generateRoster(demands, rules) {
        console.log('执行generateRoster函数');
        var persons = personList;
        if (persons.length === 0) {
            persons = [];
            for (var i = 1; i <= 8; i++) {
                persons.push({ pid: 'default_' + i, name: '员工' + i });
            }
        }
        
        var month = $('#schedule_month').val();
        var historyData = getHistoryForMonth(month);
        
        // 如果本地没有历史数据且刚刚发起了异步请求，需要等待数据加载完成
        // 这里使用简单的超时重试机制来模拟“等待”异步结果，避免阻塞UI
        if (!historyData && historySyncFlags[month]) {
            console.log('等待历史数据异步加载...');
            var checkInterval = setInterval(function() {
                var loadedData = JSON.parse(localStorage.getItem('schedule_history') || '{}')[month];
                if (loadedData || !historySyncFlags[month]) { // 数据加载成功 或 请求失败/超时
                    clearInterval(checkInterval);
                    // 无论是否加载到数据，都继续生成排班（如果没有历史数据，generateSchedule会处理null的情况）
                    performScheduleGeneration(persons, demands, rules);
                }
            }, 100);
            // 设置一个最长等待时间，防止无限等待
            setTimeout(function() {
                clearInterval(checkInterval);
                performScheduleGeneration(persons, demands, rules);
            }, 2000);
        } else {
            performScheduleGeneration(persons, demands, rules);
        }
    }
    
    function performScheduleGeneration(persons, demands, rules) {
        var roster = generateSchedule(persons, demands, rules);
        currentRoster = roster;
        renderRoster(roster);
        scheduleGenerated = true;
        generatedMonth = $('#schedule_month').val();
        saveRosterForMonth(generatedMonth, roster);
        saveSchedulePageState();
        $('#schedule_roster_section').show();
        
        $('html, body').animate({
            scrollTop: $('#schedule_roster_section').offset().top - 100
        }, 500);
        
        console.log('班表生成完成');
    }
    
    function generateSchedule(persons, demands, rules) {
        var month = $('#schedule_month').val();
        var [year, monthStr] = month.split('-');
        var daysInMonth = new Date(year, monthStr, 0).getDate();
        
        console.log('生成' + month + '月班表，共' + daysInMonth + '天');
        
        var personRestDays = {};
        demands.forEach(function(d) {
            personRestDays[d.pid] = d.restDays ? d.restDays.split(',').map(function(x) { return parseInt(x.trim()); }).filter(function(x) { return !isNaN(x); }) : [];
        });

        var currentMonthHistory = getHistoryForMonth(month);
        console.log('历史排班数据:', currentMonthHistory);

        // 第一步：初始化员工数据结构
        var demandsMap = {};
        var restDaysMap = {};
        demands.forEach(function(d) {
            demandsMap[d.pid] = d.workDays;
            restDaysMap[d.pid] = d.restDays;
        });
        
        var employees = personList.map(function(p) {
            var pid = p.pid || p.id;
            var requiredDays = demandsMap[pid] || 0;
            var restDays = restDaysMap[pid] || [];
            
            // 获取偏好信息
            var demand = demands.find(function(d) { return d.pid === pid; });
            var preferShift = demand ? demand.preferShift : '';
            var preferColleaguesRaw = demand ? demand.preferColleagues : '';
            var preferColleagues = preferColleaguesRaw ? preferColleaguesRaw.split(',').map(function(s) { return s.trim(); }).filter(function(s) { return s; }) : [];
            
            // 初始化员工数据
            var emp = {
                pid: pid,
                name: p.name,
                assignments: {},
                assignedDays: 0,
                consecutive: 0,
                lastShift: '',
                requiredDays: requiredDays,
                restDays: restDays,
                whiteDays: 0,  // 本月白班天数
                nightDays: 0,   // 本月夜班天数
                preferShift: preferShift, // 'white' or 'night'
                preferColleagues: preferColleagues // array of pids/names
            };
            
            // 获取历史班次差额
            var balanceHistory = getShiftBalanceHistory();
            var lastBalance = balanceHistory[pid];
            if (lastBalance && lastBalance.month !== month) {
                // 如果有历史记录，且不是同一个月，应用补偿逻辑
                emp.shiftDebt = lastBalance.difference || 0; // 正数表示上月白班多，本月应多排夜班
                console.log(p.name + ' 上月班次差额: ' + emp.shiftDebt + ' (正数=白班多, 负数=夜班多)');
            } else {
                emp.shiftDebt = 0;
            }
            
            return emp;
        });

        // 第二步：初始化上月末状态
        console.log('========== 初始化上月末状态 ==========');
        employees.forEach(function(emp) {
            var prevState = getPreviousMonthState(month, emp);
            emp.lastShift = prevState.lastShift;
            emp.consecutive = prevState.consecutive;
            
            if (prevState.lastShift) {
                console.log(emp.name + ': 上月末最后班次=' + (prevState.lastShift === 'white' ? '白班' : '夜班') + ', 连续工作' + prevState.consecutive + '天');
            } else {
                console.log(emp.name + ': 上月末无班次记录');
            }
        });
        console.log('===========================================');

        // 第三步：应用历史排班数据并统计已用额度
        var historicalDaysCount = 0;
        console.log('检查历史数据:', currentMonthHistory);
        
        if (currentMonthHistory && currentMonthHistory.assignments) {
            console.log('历史assignments结构:', Object.keys(currentMonthHistory.assignments));
            
            // 找出所有历史数据中最大的天数（只统计有实际班次的天数）
            var allDays = [];
            Object.keys(currentMonthHistory.assignments).forEach(function(pid) {
                var empHistory = currentMonthHistory.assignments[pid];
                var empDays = Object.keys(empHistory).filter(function(dayStr) {
                    var day = parseInt(dayStr);
                    var value = empHistory[dayStr];
                    // 只统计白班或夜班的天数，忽略"休息"
                    return value === '白班' || value === '夜班';
                }).map(Number);
                
                console.log('员工' + pid + '的有效历史天数（白班/夜班）:', empDays.sort(function(a,b) { return a-b; }));
                allDays = allDays.concat(empDays);
            });
            
            if (allDays.length > 0) {
                historicalDaysCount = Math.max.apply(null, allDays);
            }
            
            console.log('历史排班覆盖天数:', historicalDaysCount);
            console.log('所有有效历史天数:', allDays.sort(function(a,b) { return a-b; }));
        } else {
            console.log('没有历史排班数据');
        }

        // 第四步：不再应用当月历史排班数据
        // 每次生成都是基于当前需求重新计算
        // 只有上月末状态（第二步）会被用于连续性约束
        console.log('========== 开始生成新班表 ==========');
        console.log('基于当前需求重新计算，不应用当月历史数据');

        // 打印每个员工的剩余需求
        employees.forEach(function(emp) {
            console.log(emp.name + ': 总需求' + emp.requiredDays + '天, 已分配' + emp.assignedDays + '天, 剩余' + (emp.requiredDays - emp.assignedDays) + '天');
        });

        // 辅助函数
        function isRestDay(emp, day) {
            return emp.restDays.indexOf(day) !== -1;
        }
        
        // 获取历史班次差额记录
        function getShiftBalanceHistory() {
            var history = JSON.parse(localStorage.getItem('shift_balance_history') || '{}');
            return history;
        }
        
        // 保存班次差额记录
        function saveShiftBalanceHistory(balanceData) {
            localStorage.setItem('shift_balance_history', JSON.stringify(balanceData));
        }
        
        // 计算每个员工的白班/夜班差额
        function calculateShiftBalance(employees, month) {
            var balance = {};
            
            employees.forEach(function(emp) {
                var whiteDays = 0;
                var nightDays = 0;
                
                // 统计本月白班和夜班天数
                for (var day = 1; day <= 31; day++) {
                    if (emp.assignments[day] === '白班') {
                        whiteDays++;
                    } else if (emp.assignments[day] === '夜班') {
                        nightDays++;
                    }
                }
                
                // 计算差额（正数表示白班多，负数表示夜班多）
                var diff = whiteDays - nightDays;
                
                balance[emp.pid] = {
                    name: emp.name,
                    month: month,
                    whiteDays: whiteDays,
                    nightDays: nightDays,
                    totalDays: whiteDays + nightDays,
                    difference: diff, // 白班-夜班的差值
                    note: diff > 0 ? '多上' + diff + '天白班' : (diff < 0 ? '多上' + (-diff) + '天夜班' : '白班夜班均衡')
                };
                
                console.log(emp.name + ': 白班' + whiteDays + '天, 夜班' + nightDays + '天, 差额: ' + diff + ' (' + balance[emp.pid].note + ')');
            });
            
            return balance;
        }
        
        function canWork(emp, day, shiftType) {
            // 检查用户指定的休息日
            if (isRestDay(emp, day)) {
                return false;
            }
            
            // 检查是否已达上限
            if (emp.assignedDays >= emp.requiredDays) {
                return false;
            }
            
            // 检查连续天数限制
            if (emp.consecutive >= rules.maxConsecutiveDays) {
                return false;
            }
            
            return true;
        }

        function calculateEmployeeScore(emp, day, shiftType) {
            var score = 0;
            var shiftKey = shiftType === '白班' ? 'white' : 'night';

            // ===== 第0层：硬性约束（违反则直接返回-99999） =====
            
            if (emp.assignedDays >= emp.requiredDays) {
                return -99999;
            }
            
            if (isRestDay(emp, day)) {
                return -99999;
            }
            
            if (emp.lastShift) {
                var lastWorkDay = 0;
                for (var d = day - 1; d >= 1; d--) {
                    if (emp.assignments[d] && emp.assignments[d] !== '休息') {
                        lastWorkDay = d;
                        break;
                    }
                }
                
                if (lastWorkDay > 0) {
                    var restDays = day - lastWorkDay - 1;
                    
                    if (emp.lastShift === 'white' && shiftKey === 'night' && restDays < 2) {
                        return -99999;
                    }
                    if (emp.lastShift === 'night' && shiftKey === 'white' && restDays < 3) {
                        return -99999;
                    }
                }
            }
            
            // ===== 第1层：上班天数必须满足（极高优先级） =====
            
            var remainingDays = emp.requiredDays - emp.assignedDays;
            var daysLeftInMonth = daysInMonth - day + 1;
            
            if (remainingDays === daysLeftInMonth) {
                score += 50000; // 必须排班
            } else if (remainingDays > 0 && remainingDays / daysLeftInMonth > 0.7) {
                score += 30000; // 很紧迫
            } else if (remainingDays > 0) {
                score += 10000; // 有需求
            }
            
            // ===== 第2层：连续性管理（核心逻辑修复） =====
            
            // 计算休息天数
            var restDaysCount = 0;
            if (emp.lastShift) {
                for (var d = day - 1; d >= 1; d--) {
                    if (!emp.assignments[d] || emp.assignments[d] === '休息') {
                        restDaysCount++;
                    } else {
                        break;
                    }
                }
            }
            
            // 关键判断：今天上班是否会形成"上1"
            var willFormSingleDay = false;
            if (emp.consecutive === 0 && emp.lastShift) {
                // 今天休息后上班，会形成新的连续
                // 检查明天是否可能继续上班（乐观预测）
                // 如果明天也上班，就不会形成"上1"
                // 这里我们采用保守策略：假设只上1天，给惩罚
                // 但如果今天上班后连续天数会增加（说明昨天也上班了），就不惩罚
                willFormSingleDay = true;
            }
            
            // 如果今天上班会形成"上1"，给强惩罚
            if (willFormSingleDay) {
                score -= 15000; // 强惩罚"上1"，但允许极端情况（如总天数紧迫）覆盖
            }
            
            // 鼓励连续上班2-4天
            if (emp.consecutive >= 1 && emp.lastShift === shiftKey) {
                if (emp.consecutive === 1) {
                    score += 15000; // 连续第2天
                } else if (emp.consecutive === 2) {
                    score += 20000; // 连续第3天，最高奖励
                } else if (emp.consecutive === 3) {
                    score += 15000; // 连续第4天
                } else if (emp.consecutive === 4) {
                    score -= 3000; // 连续第5天，警告
                } else {
                    score -= 20000; // 连续≥6天，极强惩罚
                }
            }
            
            // 鼓励休息2-3天后上班（形成健康周期）
            if (emp.consecutive === 0 && emp.lastShift) {
                if (restDaysCount >= 2 && restDaysCount <= 3) {
                    score += 12000; // 休息2-3天后上班，高奖励
                } else if (restDaysCount === 4) {
                    score += 5000; // 休息4天，中等
                } else if (restDaysCount === 1) {
                    score -= 8000; // 只休息1天，惩罚
                } else if (restDaysCount >= 5) {
                    score -= 15000; // 休息≥5天，强惩罚
                }
            }
            
            // ===== 第3层：半月配额管理（强约束，但不如连续性） =====
            
            var midMonth = Math.ceil(daysInMonth / 2);
            var isFirstHalf = day <= midMonth;
            
            var assignedWhite = 0, assignedNight = 0;
            var firstHalfWhite = 0, firstHalfNight = 0;
            var secondHalfWhite = 0, secondHalfNight = 0;
            
            for (var d = 1; d < day; d++) {
                if (emp.assignments[d] === '白班') {
                    assignedWhite++;
                    if (d <= midMonth) firstHalfWhite++;
                    else secondHalfWhite++;
                } else if (emp.assignments[d] === '夜班') {
                    assignedNight++;
                    if (d <= midMonth) firstHalfNight++;
                    else secondHalfNight++;
                }
            }
            
            var hasPreference = emp.preferShift && emp.preferShift !== '';
            
            if (hasPreference) {
                var firstHalfTarget = emp.preferShift;
                var secondHalfTarget = emp.preferShift === 'white' ? 'night' : 'white';
                
                var currentTarget = isFirstHalf ? firstHalfTarget : secondHalfTarget;
                var currentHalfTargetAssigned = isFirstHalf ? 
                    (currentTarget === 'white' ? firstHalfWhite : firstHalfNight) :
                    (currentTarget === 'white' ? secondHalfWhite : secondHalfNight);
                
                var halfQuota = Math.ceil(emp.requiredDays / 2);
                var quotaRemaining = halfQuota - currentHalfTargetAssigned;
                
                if (shiftKey === currentTarget) {
                    if (quotaRemaining > 0) {
                        score += 8000; // 目标班次，有配额，高奖励
                    } else {
                        score -= 15000; // 配额已满，强惩罚
                    }
                } else {
                    // 排非目标班次：强惩罚
                    if (remainingDays > 0) {
                        score -= 5000; // 强惩罚，但不如"上1"惩罚强
                    } else {
                        score -= 99999; // 总天数已满
                    }
                }
            } else {
                var currentAssigned = shiftKey === 'white' ? assignedWhite : assignedNight;
                var halfQuota = Math.ceil(emp.requiredDays / 2);
                
                if (currentAssigned < halfQuota) {
                    score += 3000;
                } else if (remainingDays > 0) {
                    score += 500;
                } else {
                    score -= 99999;
                }
            }
            
            // ===== 第4层：班次均衡性（低优先级） =====
            
            var predictedWhite = assignedWhite + (shiftKey === 'white' ? 1 : 0);
            var predictedNight = assignedNight + (shiftKey === 'night' ? 1 : 0);
            var predictedDiff = Math.abs(predictedWhite - predictedNight);
            
            if (predictedDiff === 0) {
                score += 2000;
            } else if (predictedDiff === 1) {
                score += 1000;
            } else if (predictedDiff === 2) {
                score += 200;
            } else if (predictedDiff === 3) {
                score -= 1000;
            } else {
                score -= 3000;
            }
            
            return score;
        }

        function candidateScore(emp, day, shiftType) {
            // 已废弃，使用calculateEmployeeScore代替
            return calculateEmployeeScore(emp, day, shiftType);
        }

        function sortCandidates(list, day, shiftType) {
            return list.sort(function(a, b) {
                var scoreA = candidateScore(a, day, shiftType);
                var scoreB = candidateScore(b, day, shiftType);
                return scoreB - scoreA;
            });
        }

        // 第五步：从头开始生成排班
        var startDay = 1;
        console.log('从第' + startDay + '天开始生成新排班');
        console.log('需要生成的天数: ' + startDay + ' 到 ' + daysInMonth);
        
        // 第一阶段：确保每天的基本配置（2白班+2夜班）
        console.log('========== 第一阶段：基础排班 ==========');
        for (var day = startDay; day <= daysInMonth; day++) {
            console.log('========== 生成第' + day + '天 ==========');
            
            // 标记用户指定的休息日
            employees.forEach(function(emp) {
                if (isRestDay(emp, day)) {
                    emp.assignments[day] = '休息';
                }
            });
            
            // 获取所有可用员工
            var allAvailable = employees.filter(function(emp) {
                return !emp.assignments[day] && 
                       !isRestDay(emp, day) && 
                       emp.assignedDays < emp.requiredDays;
            });
            
            // 分配白班
            var whiteSlots = [];
            var assignedToday = [];
            
            for (var i = 0; i < rules.whiteDayPerDay; i++) {
                var bestEmp = null;
                var bestScore = -999999;
                
                allAvailable.forEach(function(emp) {
                    if (assignedToday.indexOf(emp) !== -1) return;
                    
                    var score = calculateEmployeeScore(emp, day, '白班');
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestEmp = emp;
                    }
                });
                
                if (bestEmp) {
                    whiteSlots.push(bestEmp);
                    assignedToday.push(bestEmp);
                }
            }
            
            // 分配夜班
            var nightSlots = [];
            
            for (var i = 0; i < rules.nightShiftPerDay; i++) {
                var bestEmp = null;
                var bestScore = -999999;
                
                allAvailable.forEach(function(emp) {
                    if (assignedToday.indexOf(emp) !== -1) return;
                    
                    var score = calculateEmployeeScore(emp, day, '夜班');
                    
                    if (score > bestScore) {
                        bestScore = score;
                        bestEmp = emp;
                    }
                });
                
                if (bestEmp) {
                    nightSlots.push(bestEmp);
                    assignedToday.push(bestEmp);
                }
            }
            
            // 应用分配
            whiteSlots.forEach(function(emp) {
                emp.assignments[day] = '白班';
                emp.assignedDays++;
                emp.consecutive = (emp.lastShift === 'white' && emp.consecutive < rules.maxConsecutiveDays) ? emp.consecutive + 1 : 1;
                emp.lastShift = 'white';
            });
            
            nightSlots.forEach(function(emp) {
                emp.assignments[day] = '夜班';
                emp.assignedDays++;
                emp.consecutive = (emp.lastShift === 'night' && emp.consecutive < rules.maxConsecutiveDays) ? emp.consecutive + 1 : 1;
                emp.lastShift = 'night';
            });
            
            console.log('第' + day + '天: 白班[' + whiteSlots.map(function(e) { return e.name; }).join(',') + '] 夜班[' + nightSlots.map(function(e) { return e.name; }).join(',') + ']');
        }
        
        // 第二阶段：补充未完成员工的剩余天数
        console.log('========== 第二阶段：补充分配 ==========');
        var needSupplement = employees.filter(function(emp) {
            return emp.assignedDays < emp.requiredDays;
        });
        
        if (needSupplement.length > 0) {
            console.log('需要补充的员工:', needSupplement.map(function(e) { 
                return e.name + '(' + (e.requiredDays - e.assignedDays) + '天)'; 
            }).join(', '));
            
            // 为每个未完成的员工找到空闲天补充
            needSupplement.forEach(function(emp) {
                var daysNeeded = emp.requiredDays - emp.assignedDays;
                var daysAssigned = 0;
                
                for (var day = startDay; day <= daysInMonth && daysAssigned < daysNeeded; day++) {
                    // 如果这一天该员工是休息且可以重新分配
                    if (emp.assignments[day] === '休息' && !isRestDay(emp, day)) {
                        // 决定分配白班还是夜班（优先保持连续性）
                        var shiftType;
                        if (emp.lastShift === 'white') {
                            shiftType = '白班';
                        } else if (emp.lastShift === 'night') {
                            shiftType = '夜班';
                        } else {
                            shiftType = '白班'; // 默认白班
                        }
                        
                        emp.assignments[day] = shiftType;
                        emp.assignedDays++;
                        daysAssigned++;
                        
                        var shiftKey = shiftType === '白班' ? 'white' : 'night';
                        emp.consecutive = emp.consecutive >= rules.maxConsecutiveDays ? 1 : emp.consecutive + 1;
                        emp.lastShift = shiftKey;
                        
                        console.log('补充第' + day + '天' + shiftType + '给: ' + emp.name + ' (连续' + emp.consecutive + '天, 已' + emp.assignedDays + '/' + emp.requiredDays + ')');
                    }
                }
            });
        }
        
        // 第三阶段：最终检查
        console.log('========== 最终检查 ==========');
        employees.forEach(function(emp) {
            console.log(emp.name + ': 需求' + emp.requiredDays + '天, 已分配' + emp.assignedDays + '天' + 
                       (emp.assignedDays < emp.requiredDays ? ' ⚠️ 未完成' : ' ✅'));
        });
        
        // 第四阶段：统计并保存班次差额记录
        console.log('========== 第四阶段：统计班次分布 ==========');
        var shiftBalance = calculateShiftBalance(employees, month);
        
        // 保存到localStorage
        saveShiftBalanceHistory(shiftBalance);
        
        // 显示详细的均衡情况
        console.log('\n=== 当月白班/夜班均衡统计 ===');
        var allBalanced = true;
        employees.forEach(function(emp) {
            var whiteCount = 0, nightCount = 0;
            for (var d = 1; d <= 31; d++) {
                if (emp.assignments[d] === '白班') whiteCount++;
                else if (emp.assignments[d] === '夜班') nightCount++;
            }
            
            var diff = Math.abs(whiteCount - nightCount);
            var status = diff <= 1 ? '✅ 均衡' : '⚠️ 偏差' + diff + '天';
            if (diff > 1) allBalanced = false;
            
            console.log(emp.name + ': 白班' + whiteCount + '天, 夜班' + nightCount + '天, 差值' + diff + '天 ' + status);
        });
        
        if (allBalanced) {
            console.log('\n🎉 所有员工当月白班/夜班分配均衡！');
        } else {
            console.log('\n⚠️ 部分员工白班/夜班存在偏差，下月将自动补偿');
        }
        
        console.log('班次差额记录已保存，下月排班时将自动参考此记录进行补偿分配');
        
        var roster = {
            daysInMonth: daysInMonth,
            month: month,
            assignments: employees.reduce(function(acc, emp) {
                acc[emp.pid] = emp.assignments;
                return acc;
            }, {}),
            persons: employees
        };
        
        console.log('班表数据生成完成');
        return roster;
    }

    function getPreviousMonthState(month, emp) {
        var prevMonth = getPreviousMonth(month);
        var history = getHistoryForMonth(prevMonth);
        if (!history || !history.assignments || !history.assignments[emp.pid]) {
            return { lastShift: '', consecutive: 0 };
        }
        var assignments = history.assignments[emp.pid];
        var days = Object.keys(assignments).map(function(day) { return parseInt(day, 10); }).sort(function(a, b) { return a - b; });
        var lastDay = days[days.length - 1];
        if (!lastDay) return { lastShift: '', consecutive: 0 };
        var lastValue = assignments[lastDay];
        if (lastValue !== '白班' && lastValue !== '夜班') return { lastShift: '', consecutive: 0 };
        var consecutive = 1;
        for (var i = lastDay - 1; i >= 1; i--) {
            if (assignments[i] === lastValue) {
                consecutive++;
            } else {
                break;
            }
        }
        return { lastShift: lastValue === '白班' ? 'white' : 'night', consecutive: consecutive };
    }

    // 计算并显示推荐上班天数
    function updateRecommendedWorkDays() {
        var month = $('#schedule_month').val();
        if (!month) return;
        
        var parts = month.split('-');
        var year = parseInt(parts[0], 10);
        var monthNum = parseInt(parts[1], 10);
        var daysInMonth = new Date(year, monthNum, 0).getDate();
        
        // 假设每天需要2个白班+2个夜班=4个班次
        var totalSlotsPerDay = 4;
        var totalSlotsInMonth = daysInMonth * totalSlotsPerDay;
        
        // 假设8个员工
        var employeeCount = 8;
        
        // 计算每人平均上班天数
        var avgWorkDays = Math.floor(totalSlotsInMonth / employeeCount);
        var remainder = totalSlotsInMonth % employeeCount;
        
        // 显示推荐信息
        $('#schedule_days_count').text(daysInMonth);
        $('#schedule_recommend_days').text(avgWorkDays + (remainder > 0 ? '-' + (avgWorkDays + 1) : ''));
        
        var note = '';
        if (remainder === 0) {
            note = '每人' + avgWorkDays + '天正好铺满全月';
        } else {
            note = remainder + '人上' + (avgWorkDays + 1) + '天，' + (employeeCount - remainder) + '人上' + avgWorkDays + '天';
        }
        $('#schedule_recommend_note').text(note);
        
        $('#schedule_recommend_info').show();
        
        console.log('========== 推荐上班天数 ==========');
        console.log('月份：' + month);
        console.log('本月天数：' + daysInMonth + '天');
        console.log('每天班次数：' + totalSlotsPerDay + '个（2白+2夜）');
        console.log('总班次数：' + totalSlotsInMonth + '个');
        console.log('员工数量：' + employeeCount + '人');
        console.log('平均每人：' + avgWorkDays + '天，余数：' + remainder + '天');
        console.log('推荐方案：' + note);
        console.log('==================================');
    }

                alert('✓ 保存成功！\n\n' + month + ' 的排班数据已保存到历史排班。');
            },
            error: function(xhr, status, error) {
                console.error('后端保存失败:', error);
                alert('保存到服务器失败，但数据已保存在浏览器本地。\n\n错误：' + error);
            }
        });
    });

    // 隐藏保存按钮（当月份改变或生成新班表前）
    $('#schedule_month').change(function() {
        $('#schedule_save_to_history_btn').hide();
    });

    console.log('初始化排班管理页面');
    restorePageState();
    loadPersonList();
});
</script>
