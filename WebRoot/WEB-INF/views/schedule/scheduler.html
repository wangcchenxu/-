<div class="header">
    <div class="stats">
    </div>
    <h1 class="page-title">排班管理</h1>
    <ul class="breadcrumb">
        <li><a href="./">Home</a> </li>
        <li class="active">排班管理</li>
    </ul>
</div>

<div class="main-content">
    <div id="schedule_step1" class="schedule-step">
        <h3>员工假期需求</h3>
        <p>记录员工在指定月份内需要休息的具体日期，保存后将自动生成班表</p>
        <div style="margin: 20px 0;">
            <label>选择月份：</label>
            <input type="month" id="schedule_month" style="padding:5px 10px;font-size:14px;">
            <span id="schedule_recommend_info" style="margin-left:20px;color:#17a2b8;font-weight:bold;display:none;">
                <i class="fa fa-lightbulb-o"></i> 
                推荐：本月共 <span id="schedule_days_count"></span> 天，建议每人上班 <span id="schedule_recommend_days"></span> 天（<span id="schedule_recommend_note"></span>）
            </span>
        </div>
        <table id="schedule_demand_table" class="table table-bordered" style="margin-top:20px;">
            <thead>
                <tr>
                    <th style="width:15%;">员工姓名</th>
                    <th style="width:12%;">本月上班天数</th>
                    <th style="width:18%;">休息日期（可多选，用逗号分隔）</th>
                    <th style="width:15%;">偏好班次（选填）</th>
                    <th style="width:20%;">希望一起上班的同事（选填，用逗号分隔）</th>
                    <th style="width:20%;">操作</th>
                </tr>
            </thead>
            <tbody id="schedule_demand_body">
            </tbody>
        </table>
        <button type="button" id="schedule_step1_save" class="btn btn-success" style="margin-top:10px;">
            <i class="fa fa-save"></i> 保存并生成班表
        </button>
    </div>
    
    <div id="schedule_roster_section" style="display:none; margin-top:30px;">
        <h3>生成的班表</h3>
        <div id="schedule_roster_container" style="overflow-x:auto; overflow-y:auto; margin-top:20px; max-height:600px; border:1px solid #ddd;">
            <table id="schedule_roster_table" class="table table-bordered table-condensed" style="border-collapse:collapse;width:auto;font-size:12px;table-layout:fixed;">
                <thead id="schedule_roster_head"></thead>
                <tbody id="schedule_roster_body"></tbody>
            </table>
        </div>
        <button type="button" id="schedule_export_btn" class="btn btn-info" style="margin-top:20px;" disabled>
            <i class="fa fa-download"></i> 导出班表
        </button>
        <button type="button" id="schedule_save_to_history_btn" class="btn btn-success" style="margin-top:20px;margin-left:10px;display:none;">
            <i class="fa fa-save"></i> 保存到历史排班
        </button>
        <button type="button" id="schedule_edit_btn" class="btn btn-warning" style="margin-top:20px;margin-left:10px;display:none;">
            <i class="fa fa-edit"></i> 启用编辑
        </button>
        <button type="button" id="schedule_save_learning_btn" class="btn btn-primary" style="margin-top:20px;margin-left:10px;display:none;">
            <i class="fa fa-graduation-cap"></i> 保存调整偏好(智能学习)
        </button>
        <button type="button" id="schedule_manage_learning_btn" class="btn btn-default" style="margin-top:20px;margin-left:10px;">
            <i class="fa fa-database"></i> 管理学习库
        </button>
        <span id="export_loading" style="display:none; margin-left:10px; color:#999;">
            <i class="fa fa-spinner fa-spin"></i> 正在导出...
        </span>
        <div id="edit_mode_tip" style="display:none; margin-top:10px; padding:10px; background:#fff3cd; border:1px solid #ffc107; border-radius:4px; color:#856404;">
            <i class="fa fa-info-circle"></i> <strong>编辑模式已启用：</strong>点击任意班表格子可以切换班次(休息→白班→夜班→休息)，调整完成后点击"保存调整偏好"让系统学习您的排班风格。
        </div>
    </div>
    
    <!-- 学习数据管理弹窗 -->
    <div id="learning_management_modal" class="modal fade" tabindex="-1" role="dialog">
        <div class="modal-dialog modal-lg" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal">&times;</button>
                    <h4 class="modal-title"><i class="fa fa-database"></i> 学习数据管理</h4>
                </div>
                <div class="modal-body">
                    <div id="learning_list_container" style="max-height:500px; overflow-y:auto;">
                        <p class="text-muted">暂无学习数据</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-danger" id="clear_all_learning_btn">
                        <i class="fa fa-trash"></i> 清空所有学习数据
                    </button>
                    <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/FinalScheduler/public/js/scheduling_v5.js" type="text/javascript"></script>
<script type="text/javascript">
$(function() {
    // ===== 版本标记：用于确认代码是否更新 =====
    console.log('%c========== 排班算法 v5.0 (用户需求定制版) ==========', 'color: green; font-size: 16px; font-weight: bold;');
    console.log('%c核心特性: 1. 月度配额计算 2. 连续块模式生成 3. 逐日精排 4. 全局优化 5. 跨月记忆', 'color: blue;');
    console.log('%c如果看不到此日志,说明浏览器缓存了旧代码,请按 Ctrl+F5 强制刷新', 'color: orange;');
    console.log('=================================================', 'color: green; font-size: 16px; font-weight: bold;');
    
    console.log('排班管理页面加载...');
    var currentMonth = new Date().toISOString().substring(0, 7);
    $('#schedule_month').val(currentMonth);
    
    var scheduleGenerated = false;
    var generatedMonth = null;
    var personList = [];
    var currentRoster = null;
    
    // 同步标志，避免重复请求
    var historySyncFlags = {};

    function getSchedulePageState() {
        return JSON.parse(localStorage.getItem('schedule_page_state') || '{}');
    }

    function saveSchedulePageState() {
        var state = {
            selectedMonth: $('#schedule_month').val(),
            generatedMonth: generatedMonth,
            scheduleGenerated: scheduleGenerated
        };
        localStorage.setItem('schedule_page_state', JSON.stringify(state));
    }

    function getSavedRosterForMonth(month) {
        // 优先从 schedule_roster 读取
        var all = JSON.parse(localStorage.getItem('schedule_roster') || '{}');
        if (all[month]) {
            return all[month];
        }
        
        // 如果没有，尝试从 schedule_history 恢复（兼容旧数据）
        var history = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        var historyData = history[month];
        if (historyData && historyData.assignments) {
            // 将历史数据转换为 roster 格式
            var persons = [];
            Object.keys(historyData.assignments).forEach(function(pid) {
                persons.push({
                    pid: pid,
                    name: pid,
                    assignments: historyData.assignments[pid]
                });
            });
            
            var year = parseInt(month.split('-')[0], 10);
            var monthNum = parseInt(month.split('-')[1], 10);
            var daysInMonth = new Date(year, monthNum, 0).getDate();
            
            return {
                month: month,
                daysInMonth: daysInMonth,
                persons: persons
            };
        }
        
        return null;
    }

    function saveRosterForMonth(month, roster) {
        var all = JSON.parse(localStorage.getItem('schedule_roster') || '{}');
        all[month] = roster;
        localStorage.setItem('schedule_roster', JSON.stringify(all));
        
        // 同时保存到历史排班，确保历史数据不丢失
        var history = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        var historyData = {
            month: month,
            assignments: {}
        };
        
        if (roster && roster.persons) {
            roster.persons.forEach(function(emp) {
                historyData.assignments[emp.pid] = emp.assignments || {};
            });
        }
        
        history[month] = historyData;
        localStorage.setItem('schedule_history', JSON.stringify(history));
    }

    function collectCurrentDemands() {
        var month = $('#schedule_month').val();
        var demands = [];
        $('#schedule_demand_body tr').each(function() {
            var pid = $(this).find('.schedule-work-days').data('pid');
            var restDays = $(this).find('.schedule-rest-days').val();
            var workDays = parseInt($(this).find('.schedule-work-days').val(), 10);
            var preferShift = $(this).find('.schedule-prefer-shift').val();
            var preferColleagues = $(this).find('.schedule-prefer-colleagues').val();
            var name = $(this).find('td:first').text().trim(); // 获取员工姓名
            if (isNaN(workDays) || workDays < 0) workDays = 15;
            demands.push({
                pid: pid,
                name: name, // 添加姓名字段
                month: month,
                restDays: restDays,
                workDays: workDays,
                preferShift: preferShift,
                preferColleagues: preferColleagues
            });
        });
        return demands;
    }

    function restorePageState() {
        var state = getSchedulePageState();
        if (state.selectedMonth) {
            $('#schedule_month').val(state.selectedMonth);
            currentMonth = state.selectedMonth;
        }
    }

    function restoreRosterForMonth(month) {
        var savedRoster = getSavedRosterForMonth(month);
        if (savedRoster) {
            currentRoster = savedRoster;
            renderRoster(savedRoster);
            scheduleGenerated = true;
            generatedMonth = month;
            $('#schedule_roster_section').show();
        }
    }

    function getSavedDemandsForMonth(month) {
        var all = JSON.parse(localStorage.getItem('schedule_demands') || '{}');
        return all[month] || [];
    }

    function saveDemandsForMonth(month, demands) {
        var all = JSON.parse(localStorage.getItem('schedule_demands') || '{}');
        all[month] = demands;
        localStorage.setItem('schedule_demands', JSON.stringify(all));
    }

    function getHistoryForMonth(month) {
        var all = JSON.parse(localStorage.getItem('schedule_history') || '{}');
        
        // 如果localStorage中有数据，直接返回
        if (all[month]) {
            return all[month];
        }
        
        // 如果还没有同步过，尝试从后端异步加载
        if (!historySyncFlags[month]) {
            historySyncFlags[month] = true; // 标记为已请求
            
            $.ajax({
                url: '/FinalScheduler/api/loadHistory?month=' + month,
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response && response.history) {
                        console.log('从后端异步加载历史数据到排班页面:', month);
                        // 同步到localStorage
                        var currentAll = JSON.parse(localStorage.getItem('schedule_history') || '{}');
                        currentAll[month] = response.history;
                        localStorage.setItem('schedule_history', JSON.stringify(currentAll));
                    }
                },
                error: function(xhr, status, error) {
                    console.log('后端没有' + month + '的历史数据或加载失败:', error);
                }
            });
        }
        
        // 直接返回localStorage中的数据（如果没有则为null）
        // 后端异步加载完成后会自动更新localStorage，下次调用时即可获取
        return all[month] || null;
    }

    function getPreviousMonth(month) {
        var parts = month.split('-');
        var y = parseInt(parts[0], 10);
        var m = parseInt(parts[1], 10);
        m--;
        if (m < 1) { y--; m = 12; }
        return y + '-' + (m < 10 ? '0' + m : m);
    }

    function loadPersonList() {
        var month = $('#schedule_month').val();
        var savedDemands = getSavedDemandsForMonth(month);
        var [year, monthStr] = month.split('-');
        var daysInMonth = new Date(year, monthStr, 0).getDate();
        
        console.log('加载人员列表...');
        $.ajax({
            url: '/FinalScheduler/queryPerson',
            type: 'GET',
            dataType: 'json',
            success: function(data) {
                console.log('人员数据:', data);
                var html = '';
                var rows = data.slice();
                if (rows.length === 0) {
                    for (var i = 1; i <= 8; i++) {
                        rows.push({ pid: 'default_' + i, name: '员工' + i });
                    }
                }
                
                rows.forEach(function(person) {
                    var demand = savedDemands.find(function(item) { return item.pid === person.pid; }) || {};
                    var workDaysValue = demand.workDays || 15;
                    var preferShift = demand.preferShift || '';
                    var preferColleagues = demand.preferColleagues || '';
                    html += '<tr>';
                    html += '<td>' + person.name + '</td>';
                    html += '<td><input type="number" min="0" max="' + daysInMonth + '" class="schedule-work-days" data-pid="' + person.pid + '" value="' + workDaysValue + '" style="width:100%;padding:5px;"></td>';
                    html += '<td><input type="text" class="schedule-rest-days" data-pid="' + person.pid + '" value="' + (demand.restDays || '') + '" placeholder="例：5,6,12,13" style="width:100%;padding:5px;"></td>';
                    html += '<td><select class="schedule-prefer-shift" data-pid="' + person.pid + '" style="width:100%;padding:5px;">';
                    html += '<option value="">不指定</option>';
                    html += '<option value="white"' + (preferShift === 'white' ? ' selected' : '') + '>前半月白班</option>';
                    html += '<option value="night"' + (preferShift === 'night' ? ' selected' : '') + '>前半月夜班</option>';
                    html += '</select></td>';
                    html += '<td><input type="text" class="schedule-prefer-colleagues" data-pid="' + person.pid + '" value="' + preferColleagues + '" placeholder="例：马泽,王晗" style="width:100%;padding:5px;"></td>';
                    html += '<td><button type="button" class="btn btn-xs btn-danger schedule-delete-demand" data-pid="' + person.pid + '"><i class="fa fa-trash"></i> 删除</button></td>';
                    html += '</tr>';
                });
                $('#schedule_demand_body').html(html);
                personList = rows;
                restoreRosterForMonth(month);
            },
            error: function(xhr, status, error) {
                console.error('加载人员列表失败:', error);
                var html = '';
                for (var i = 1; i <= 8; i++) {
                    var pid = 'default_' + i;
                    var demand = savedDemands.find(function(item) { return item.pid === pid; }) || {};
                    var workDaysValue = demand.workDays || 15;
                    html += '<tr>';
                    html += '<td>员工' + i + '</td>';
                    html += '<td><input type="number" min="0" max="' + daysInMonth + '" class="schedule-work-days" data-pid="' + pid + '" value="' + workDaysValue + '" style="width:100%;padding:5px;"></td>';
                    html += '<td><input type="text" class="schedule-rest-days" data-pid="' + pid + '" value="' + (demand.restDays || '') + '" placeholder="例：5,6,12,13" style="width:100%;padding:5px;"></td>';
                    html += '<td><button type="button" class="btn btn-xs btn-danger schedule-delete-demand" data-pid="' + pid + '"><i class="fa fa-trash"></i> 删除</button></td>';
                    html += '</tr>';
                }
                $('#schedule_demand_body').html(html);
                personList = [];
                for (var i = 1; i <= 8; i++) {
                    personList.push({ pid: 'default_' + i, name: '员工' + i });
                }
                restoreRosterForMonth(month);
            }
        });
    }
    
    // 绑定保存按钮事件 - 使用事件委托确保可靠性
    $(document).off('click', '#schedule_step1_save').on('click', '#schedule_step1_save', function() {
        console.log('点击保存并生成班表按钮');
        var month = $('#schedule_month').val();
        var demands = collectCurrentDemands();
        
        console.log('收集到的需求:', demands);
        
        if (demands.length === 0) {
            alert('请至少填写一个员工的需求');
            return;
        }
        
        saveDemandsForMonth(month, demands);
        saveSchedulePageState();
        
        var rules = {
            whiteDayPerDay: 2,
            nightShiftPerDay: 2,
            minConsecutiveDays: 2,
            maxConsecutiveDays: 5
        };
        
        console.log('开始生成班表...');
        generateRoster(demands, rules);
    });

    function generateRoster(demands, rules) {
        console.log('执行generateRoster函数');
        var persons = personList;
        if (persons.length === 0) {
            persons = [];
            for (var i = 1; i <= 8; i++) {
                persons.push({ pid: 'default_' + i, name: '员工' + i });
            }
        }
        
        var month = $('#schedule_month').val();
        var historyData = getHistoryForMonth(month);
        
        // 如果本地没有历史数据且刚刚发起了异步请求，需要等待数据加载完成
        // 这里使用简单的超时重试机制来模拟“等待”异步结果，避免阻塞UI
        if (!historyData && historySyncFlags[month]) {
            console.log('等待历史数据异步加载...');
            var checkInterval = setInterval(function() {
                var loadedData = JSON.parse(localStorage.getItem('schedule_history') || '{}')[month];
                if (loadedData || !historySyncFlags[month]) { // 数据加载成功 或 请求失败/超时
                    clearInterval(checkInterval);
                    // 无论是否加载到数据，都继续生成排班（如果没有历史数据，generateSchedule会处理null的情况）
                    performScheduleGeneration(persons, demands, rules);
                }
            }, 100);
            // 设置一个最长等待时间，防止无限等待
            setTimeout(function() {
                clearInterval(checkInterval);
                performScheduleGeneration(persons, demands, rules);
            }, 2000);
        } else {
            performScheduleGeneration(persons, demands, rules);
        }
    }
    
    function performScheduleGeneration(persons, demands, rules) {
        var roster = generateSchedule(persons, demands, rules);
        currentRoster = roster;
        renderRoster(roster);
        scheduleGenerated = true;
        generatedMonth = $('#schedule_month').val();
        saveRosterForMonth(generatedMonth, roster);
        saveSchedulePageState();
        $('#schedule_roster_section').show();
        
        $('html, body').animate({
            scrollTop: $('#schedule_roster_section').offset().top - 100
        }, 500);
        
        console.log('班表生成完成');
    }
    
    function generateSchedule(persons, demands, rules) {
    console.log('\n%c========== 开始分层递进式排班算法 v5.0 ==========', 'color: green; font-size: 16px; font-weight: bold;');
    console.log('persons数量: ' + (persons ? persons.length : 'null'));
    console.log('demands数量: ' + (demands ? demands.length : 'null'));
    console.log('rules: ', rules);
    
    var month = $('#schedule_month').val();
    var parts = month.split('-');
    var year = parseInt(parts[0], 10);
    var monthStr = parseInt(parts[1], 10);
    var daysInMonth = new Date(year, monthStr, 0).getDate();
    
    console.log('月份: ' + month + ', 天数: ' + daysInMonth);
    console.log('员工数量: ' + persons.length);
    
    try {
        // ===== 第零层：数据准备 =====
        console.log('\n[第零层] 数据准备...');
        var personRestDays = {};
        demands.forEach(function(d) {
            // 解析休息日期,支持多种格式
            var restDaysArray = [];
            var rawInput = d.restDays || '';
            
            if (rawInput.trim() !== '') {
                // 尝试多种分隔符：逗号、顿号、空格
                var parts = rawInput.split(/[,，、\s]+/);
                console.log('  ' + (d.name || d.pid) + ': 原始输入="' + rawInput + '", 分割后=' + JSON.stringify(parts));
                
                parts.forEach(function(part) {
                    // 提取数字（支持"5日"、"第5天"等格式）
                    var match = part.match(/(\d+)/);
                    if (match) {
                        var day = parseInt(match[1]);
                        if (day >= 1 && day <= daysInMonth) {
                            restDaysArray.push(day);
                        }
                    }
                });
                
                // 去重并排序
                restDaysArray = [...new Set(restDaysArray)].sort(function(a, b) { return a - b; });
            }
            
            personRestDays[d.pid] = restDaysArray;
            console.log('  ' + (d.name || d.pid) + '(pid:' + d.pid + '): 最终解析结果=' + JSON.stringify(restDaysArray));
        });
        console.log('[第零层] 完成');
        console.log('personRestDays完整数据:', JSON.stringify(personRestDays));
        
        // ===== 第一层:月度配额计算 =====
        console.log('\n===== 第一层:月度配额计算 =====');
        var monthlyQuotas = calculateMonthlyQuotas(persons, demands, daysInMonth, month, personRestDays);
        console.log('===== 第一层完成 =====\n');
        
        // ===== 第二层：逐日排班 =====
        console.log('\n===== 第二层：逐日排班 =====');
        var employees = performDailyScheduling(persons, demands, daysInMonth, month, monthlyQuotas, personRestDays);
        console.log('===== 第二层完成 =====\n');
        
        // ===== 第三层：统计与记忆更新 =====
        console.log('\n===== 第三层：统计与记忆更新 =====');
        updateMemoryAndStatistics(employees, month, daysInMonth);
        console.log('===== 第三层完成 =====\n');
        
        var roster = {
            daysInMonth: daysInMonth,
            month: month,
            assignments: employees.reduce(function(acc, emp) {
                acc[emp.pid] = emp.assignments;
                return acc;
            }, {}),
            persons: employees
        };
        
        console.log('\n%c========== 排班算法完成 ==========', 'color: green; font-size: 16px; font-weight: bold;');
        validateRoster(roster, rules);
        return roster;
        
    } catch (error) {
        console.error('%c排班算法执行出错:', 'color: red; font-size: 14px; font-weight: bold;', error);
        alert('排班算法执行失败: ' + error.message);
        throw error;
    }
}

// 以下旧版v4.0算法函数已被v5.0替代，已删除
// - performDailyScheduling (旧版)
// - repairSchedule
// - optimizeSchedule
// - globalOptimization
// - generateBlockTemplates
// - createOptimalBlocks

// - splitIntoBlocks
    
// ===== v5.0 辅助函数已在 scheduling_v5.js 中定义 =====

    function renderRoster(roster) {
        console.log('渲染班表...');
        
        var daysInMonth = roster.daysInMonth;
        
        // 优化表头:固定所有列宽,确保一致性
        var headHtml = '<tr>';
        headHtml += '<th style="width:120px;min-width:120px;max-width:120px;">姓名</th>';
        for (var i = 1; i <= daysInMonth; i++) {
            headHtml += '<th style="width:60px;min-width:60px;max-width:60px;text-align:center;">' + i + '</th>';
        }
        headHtml += '</tr>';
        $('#schedule_roster_head').html(headHtml);

        // 优化表体:统一所有单元格宽度
        var bodyHtml = '';
        roster.persons.forEach(function(emp, empIndex) {
            bodyHtml += '<tr>';
            bodyHtml += '<td style="width:120px;min-width:120px;max-width:120px;font-weight:bold;background:#f7f7f7;">' + emp.name + '</td>';
            
            for (var day = 1; day <= daysInMonth; day++) {
                var assignment = emp.assignments[day] || 'rest';
                var displayText = assignment;
                var bgColor = '#d9edf7';
                var textColor = '#333';
                
                // 映射英文到中文
                if (assignment === 'white') {
                    displayText = '白班';
                    bgColor = '#f0ad4e';
                    textColor = '#fff';
                } else if (assignment === 'night') {
                    displayText = '夜班';
                    bgColor = '#d9534f';
                    textColor = '#fff';
                } else if (assignment === 'rest') {
                    displayText = '休息';
                    bgColor = '#d9edf7';
                    textColor = '#333';
                }
                
                // 添加编辑模式的样式和事件
                var editClass = 'roster-cell';
                var editStyle = 'width:60px;min-width:60px;max-width:60px;height:32px;background:' + bgColor + ';color:' + textColor + ';text-align:center;vertical-align:middle;white-space:nowrap;overflow:hidden;cursor:default;';
                
                bodyHtml += '<td class="' + editClass + '" data-emp-index="' + empIndex + '" data-day="' + day + '" data-shift="' + assignment + '" style="' + editStyle + '">' + displayText + '</td>';
            }
            bodyHtml += '</tr>';
        });
        $('#schedule_roster_body').html(bodyHtml);
        console.log('班表渲染完成');
        
        // 绑定编辑事件
        bindEditEvents();

        $('#schedule_export_btn').prop('disabled', false);

        $('#schedule_save_to_history_btn').show();
        $('#schedule_edit_btn').show();
    }

    $(document).off('change', '#schedule_month').on('change', '#schedule_month', function() {
        scheduleGenerated = false;
        generatedMonth = null;
        currentRoster = null;
        $('#schedule_roster_section').hide();

        updateRecommendedWorkDays();

    // 计算并显示推荐上班天数
    function updateRecommendedWorkDays() {
        var month = $('#schedule_month').val();
        if (!month) return;
        
        var parts = month.split('-');
        var year = parseInt(parts[0], 10);
        var monthNum = parseInt(parts[1], 10);
        var daysInMonth = new Date(year, monthNum, 0).getDate();
        
        // 假设每天需要2个白班+2个夜班=4个班次
        var totalSlotsPerDay = 4;
        var totalSlotsInMonth = daysInMonth * totalSlotsPerDay;
        
        // 假设8个员工
        var employeeCount = 8;
        
        // 计算每人平均上班天数
        var avgWorkDays = Math.floor(totalSlotsInMonth / employeeCount);
        var remainder = totalSlotsInMonth % employeeCount;
        
        // 显示推荐信息
        $('#schedule_days_count').text(daysInMonth);
        $('#schedule_recommend_days').text(avgWorkDays + (remainder > 0 ? '-' + (avgWorkDays + 1) : ''));
        
        var note = '';
        if (remainder === 0) {
            note = '每人' + avgWorkDays + '天正好铺满全月';
        } else {
            note = remainder + '人上' + (avgWorkDays + 1) + '天，' + (employeeCount - remainder) + '人上' + avgWorkDays + '天';
        }
        $('#schedule_recommend_note').text(note);
        
        $('#schedule_recommend_info').show();
        
        console.log('========== 推荐上班天数 ==========');
        console.log('月份：' + month);
        console.log('本月天数：' + daysInMonth + '天');
        console.log('每天班次数：' + totalSlotsPerDay + '个（2白+2夜）');
        console.log('总班次数：' + totalSlotsInMonth + '个');
        console.log('员工数量：' + employeeCount + '人');
        console.log('平均每人：' + avgWorkDays + '天，余数：' + remainder + '天');
        console.log('推荐方案：' + note);
        console.log('==================================');
    }

    $(document).off('click', '#schedule_demand_body').on('click', '#schedule_demand_body', '.schedule-delete-demand', function() {
        var pid = $(this).data('pid');
        $(this).closest('tr').remove();

        saveDemandsForMonth($('#schedule_month').val(), demands);

    });

    $(document).off('click', '#schedule_export_btn').on('click', '#schedule_export_btn', function() {
        if (!scheduleGenerated || !currentRoster) {
            alert('请先生成班表！');
            return;
        }

        var month = $('#schedule_month').val();
        var exportData = [];
        var daysInMonth = currentRoster.daysInMonth;
        
        var header = ['姓名'];
        for (var i = 1; i <= daysInMonth; i++) {
            header.push(i + '日');
        }
        exportData.push(header);

        currentRoster.persons.forEach(function(emp) {
            var row = [emp.name || emp.pid];
            for (var day = 1; day <= daysInMonth; day++) {
                var assignment = emp.assignments[day] || '休息';
                row.push(assignment);
            }
            exportData.push(row);
        });

        // 显示加载提示
        $('#schedule_export_btn').prop('disabled', true);
        $('#export_loading').show();

        var xhr = new XMLHttpRequest();
        xhr.open('POST', '/FinalScheduler/export/schedule', true);
        xhr.responseType = 'blob';
        xhr.setRequestHeader('Content-Type', 'application/json');

        xhr.onload = function() {
            // 隐藏加载提示
            $('#schedule_export_btn').prop('disabled', false);
            $('#export_loading').hide();

            if (this.status === 200) {
                var blob = this.response;
                var url = window.URL.createObjectURL(blob);
                var a = document.createElement('a');
                a.href = url;
                a.download = month + '_班表.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                console.log('导出成功');
            } else {
                console.error('导出失败: Status ' + this.status);
                alert('导出班表失败，请稍后重试！');
            }
        };

        xhr.onerror = function() {
            // 隐藏加载提示
            $('#schedule_export_btn').prop('disabled', false);
            $('#export_loading').hide();

            console.error('导出请求网络错误');
            alert('导出班表失败，请检查网络连接！');
        };

        xhr.send(JSON.stringify({
            month: month,
            data: exportData
        }));
    });

    // 保存到历史排班
    $(document).on('click', '#schedule_save_to_history_btn', function() {

            url: '/FinalScheduler/api/saveHistory',

                month: month,
                history: historyData
            }),
            success: function(response) {
                console.log('历史排班保存成功:', response);

                console.error('后端保存失败:', error);

            }
        });

    // 隐藏保存按钮（当月份改变或生成新班表前）
    $('#schedule_month').change(function() {
        $('#schedule_save_to_history_btn').hide();
    });

    console.log('初始化排班管理页面');
    restorePageState();
    loadPersonList();
    
    // ===== 编辑模式和智能学习功能 =====
    var editMode = false;
    var originalRoster = null; // 保存原始班表用于对比学习
    
    // 启用编辑按钮
    $(document).off('click', '#schedule_edit_btn').on('click', '#schedule_edit_btn', function() {
        editMode = !editMode;
        
        if (editMode) {
            // 进入编辑模式
            originalRoster = JSON.parse(JSON.stringify(currentRoster)); // 深拷贝保存原始状态
            $('#schedule_edit_btn').html('<i class="fa fa-times"></i> 退出编辑');
            $('#schedule_edit_btn').removeClass('btn-warning').addClass('btn-danger');
            $('#schedule_save_learning_btn').show();
            $('#edit_mode_tip').show();
            
            // 修改单元格样式
            $('.roster-cell').css({
                'cursor': 'pointer',
                'border': '2px dashed #999'
            }).hover(
                function() { $(this).css('background-color', '#fff3cd'); },
                function() { 
                    var shift = $(this).data('shift');

            exitEditMode();

    // 退出编辑模式
    function exitEditMode() {
        editMode = false;
        $('#schedule_edit_btn').html('<i class="fa fa-edit"></i> 启用编辑');
        $('#schedule_edit_btn').removeClass('btn-danger').addClass('btn-warning');

        $('#edit_mode_tip').hide();
        
        // 恢复单元格样式
        $('.roster-cell').css({
            'cursor': 'default',
            'border': 'none'
        }).off('mouseenter mouseleave');

    // 绑定单元格点击事件
    function bindEditEvents() {
        $(document).off('click', '.roster-cell').on('click', '.roster-cell', function() {
            if (!editMode) return;
            
            var $cell = $(this);
            var empIndex = parseInt($cell.data('emp-index'));
            var day = parseInt($cell.data('day'));
            var currentShift = $cell.data('shift');
            
            // 切换班次: rest -> white -> night -> rest
            var newShift;
            if (currentShift === 'rest') {
                newShift = 'white';
            } else if (currentShift === 'white') {
                newShift = 'night';
            } else {
                newShift = 'rest';
            }
            
            // 更新数据
            currentRoster.persons[empIndex].assignments[day] = newShift;
            $cell.data('shift', newShift);
            
            // 更新显示
            var displayText, bgColor, textColor;
            if (newShift === 'white') {
                displayText = '白班';
                bgColor = '#f0ad4e';
                textColor = '#fff';
            } else if (newShift === 'night') {
                displayText = '夜班';
                bgColor = '#d9534f';
                textColor = '#fff';
            } else {
                displayText = '休息';
                bgColor = '#d9edf7';
                textColor = '#333';
            }
            
            $cell.text(displayText).css({
                'background-color': bgColor,
                'color': textColor
            });
            
            console.log('员工' + currentRoster.persons[empIndex].name + '第' + day + '天: ' + currentShift + ' -> ' + newShift);
        });

    // 保存学习偏好
    $(document).off('click', '#schedule_save_learning_btn').on('click', '#schedule_save_learning_btn', function() {
        if (!originalRoster || !currentRoster) {
            alert('没有可学习的数据!');
            return;
        }
        
        // 分析调整模式
        var learningData = analyzeAdjustments(originalRoster, currentRoster);
        
        // 保存到localStorage
        saveLearningPreferences(learningData);
        
        alert('✓ 学习数据已保存!\n\n系统已记录您的排班偏好,下次生成班表时会自动应用这些偏好。\n\n学习内容包括:\n- 班次分布偏好\n- 连续工作天数偏好\n- 休息日模式偏好\n- 班次切换模式');
        
        console.log('学习数据:', learningData);
        
        // 退出编辑模式
        exitEditMode();
    });
    
    // 分析调整模式
    function analyzeAdjustments(original, adjusted) {
        var learning = {
            timestamp: new Date().toISOString(),
            month: $('#schedule_month').val(),
            adjustments: []
        };
        
        original.persons.forEach(function(originalEmp, empIndex) {
            var adjustedEmp = adjusted.persons[empIndex];
            var empLearning = {
                name: originalEmp.name,
                pid: originalEmp.pid,
                patterns: {
                    shiftDistribution: { white: 0, night: 0, rest: 0 },
                    consecutiveWorkDays: [],
                    consecutiveRestDays: [],
                    shiftSwitches: []
                }
            };
            
            var daysInMonth = original.daysInMonth;
            var consecutiveWork = 0;
            var consecutiveRest = 0;
            var lastShift = null;
            
            for (var day = 1; day <= daysInMonth; day++) {
                var origShift = originalEmp.assignments[day] || 'rest';
                var adjShift = adjustedEmp.assignments[day] || 'rest';
                
                // 记录调整
                if (origShift !== adjShift) {
                    empLearning.patterns.shiftDistribution[adjShift]++;
                    
                    // 记录班次切换
                    if (lastShift && lastShift !== adjShift) {
                        empLearning.patterns.shiftSwitches.push({
                            day: day,
                            from: lastShift,
                            to: adjShift
                        });
                    }
                    
                    lastShift = adjShift;
                }
                
                // 计算连续工作/休息天数
                if (adjShift !== 'rest') {
                    consecutiveWork++;
                    if (consecutiveRest > 0) {
                        empLearning.patterns.consecutiveRestDays.push(consecutiveRest);
                        consecutiveRest = 0;
                    }
                } else {
                    consecutiveRest++;
                    if (consecutiveWork > 0) {
                        empLearning.patterns.consecutiveWorkDays.push(consecutiveWork);
                        consecutiveWork = 0;
                    }
                }
            }
            
            // 记录最后的连续天数
            if (consecutiveWork > 0) empLearning.patterns.consecutiveWorkDays.push(consecutiveWork);
            if (consecutiveRest > 0) empLearning.patterns.consecutiveRestDays.push(consecutiveRest);
            
            learning.adjustments.push(empLearning);
        });
        
        return learning;
    }
    
    // 保存学习偏好到localStorage
    function saveLearningPreferences(learningData) {
        var allLearning = JSON.parse(localStorage.getItem('user_scheduling_preferences') || '[]');
        
        // 添加新的学习记录
        allLearning.push(learningData);
        
        // 只保留最近10次学习记录
        if (allLearning.length > 10) {
            allLearning = allLearning.slice(-10);
        }
        
        localStorage.setItem('user_scheduling_preferences', JSON.stringify(allLearning));
        console.log('学习数据已保存,当前共有' + allLearning.length + '条学习记录');
    }
    
    // 加载学习偏好(在生成班表时调用)
    function loadLearningPreferences() {
        var allLearning = JSON.parse(localStorage.getItem('user_scheduling_preferences') || '[]');
        
        if (allLearning.length === 0) {
            console.log('暂无学习数据');
            return null;
        }
        
        // 返回最近的学习记录
        var latest = allLearning[allLearning.length - 1];
        console.log('已加载学习数据,包含' + latest.adjustments.length + '名员工的偏好');
        return latest;
    }
    
    // ===== 学习数据管理功能 =====
    
    // 打开学习数据管理弹窗
    $(document).off('click', '#schedule_manage_learning_btn').on('click', '#schedule_manage_learning_btn', function() {
        $('#learning_management_modal').modal('show');
        loadLearningList();
    });
    
    // 加载学习数据列表
    function loadLearningList() {
        var allLearning = JSON.parse(localStorage.getItem('user_scheduling_preferences') || '[]');
        var $container = $('#learning_list_container');
        
        if (allLearning.length === 0) {
            $container.html('<p class="text-muted text-center" style="padding:40px;"><i class="fa fa-inbox" style="font-size:48px;color:#ddd;"></i><br><br>暂无学习数据</p>');
            return;
        }
        
        var html = '<div class="list-group">';
        
        // 倒序显示，最新的在前
        allLearning.slice().reverse().forEach(function(learning, reverseIndex) {
            var actualIndex = allLearning.length - 1 - reverseIndex;
            var date = new Date(learning.timestamp);
            var dateStr = date.getFullYear() + '-' + 
                         String(date.getMonth() + 1).padStart(2, '0') + '-' + 
                         String(date.getDate()).padStart(2, '0') + ' ' +
                         String(date.getHours()).padStart(2, '0') + ':' +
                         String(date.getMinutes()).padStart(2, '0');
            
            html += '<div class="list-group-item">';
            html += '<div class="row">';
            html += '<div class="col-md-8">';
            html += '<h5 class="list-group-item-heading">';
            html += '<i class="fa fa-calendar" style="color:#337ab7;"></i> ' + learning.month;
            html += '<small class="text-muted" style="margin-left:10px;">' + dateStr + '</small>';
            html += '</h5>';
            html += '<p class="list-group-item-text text-muted">';
            html += '包含 <strong>' + learning.adjustments.length + '</strong> 名员工的排班偏好';
            html += '</p>';
            html += '<div style="margin-top:8px;">';
            
            // 显示每个员工的简要信息
            learning.adjustments.slice(0, 3).forEach(function(adj) {
                var patterns = adj.patterns;
                var whiteCount = patterns.shiftDistribution.white || 0;
                var nightCount = patterns.shiftDistribution.night || 0;
                var avgWork = patterns.avgConsecutiveWork ? patterns.avgConsecutiveWork.toFixed(1) : '-';
                var avgRest = patterns.avgConsecutiveRest ? patterns.avgConsecutiveRest.toFixed(1) : '-';
                
                html += '<span class="label label-info" style="margin-right:5px;">';
                html += adj.name + ' (白' + whiteCount + '/夜' + nightCount + ', 连' + avgWork + '休' + avgRest + ')';
                html += '</span>';
            });
            
            if (learning.adjustments.length > 3) {
                html += '<span class="label label-default">+' + (learning.adjustments.length - 3) + ' 更多</span>';
            }
            
            html += '</div>';
            html += '</div>';
            html += '<div class="col-md-4 text-right" style="padding-top:15px;">';
            html += '<button class="btn btn-sm btn-danger delete-learning-btn" data-index="' + actualIndex + '">';
            html += '<i class="fa fa-trash"></i> 删除';
            html += '</button>';
            html += '</div>';
            html += '</div>';
            html += '</div>';
        });
        
        html += '</div>';
        $container.html(html);
    }
    
    // 删除单条学习记录
    $(document).off('click', '.delete-learning-btn').on('click', '.delete-learning-btn', function() {
        var index = parseInt($(this).data('index'));

            if (allLearning.length === 0) {

    // 清空所有学习数据
    $(document).off('click', '#clear_all_learning_btn').on('click', '#clear_all_learning_btn', function() {

});
